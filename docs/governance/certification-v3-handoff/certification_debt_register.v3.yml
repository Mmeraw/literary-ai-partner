# Certification Debt Register  (PROPOSED v3 - no implementation code)
# Safety-case model: a boundary is trusted only to the level its EVIDENCE supports.
# 'declared_status' is DERIVED by deriveCertificationStatus() (policy Part B0), never hand-authored;
# the gate fails if the registry claim != the derived value (STATUS_CLAIM_MISMATCH).
#
# Source of truth: lib/evaluation/fipocRegistry.ts | Deterministically generated: 2026-07-22 | reconciled against protected main 5d47ca9971336bf60c487945fcdda17e47ec0012 (PR #1427)
# DERIVED STATE, not authored truth: CI regenerates from the registry at PR head; any diff fails
# (REGISTER_DRIFT). Baselines compared against PROTECTED main only.
#
# EXPIRY SEMANTICS: a debt is valid iff NOW_utc < expires_before_utc (EXCLUSIVE). At/after that
# instant the debt is expired and CI fails. NOW is injectable via SIPOC_GATE_NOW for tests.
#
# EVIDENCE OBLIGATION IDS are STABLE and are the unit of the EVIDENCE_REDUCTION check (compared
# by id set vs main, never by prose). Rewording a 'rule' string never satisfies/defeats the check.
# 'evidence_state' is one of: SATISFIED_BY_FIXTURE (fixture named) | REQUIRED_TO_RETIRE (must be
# supplied by the remediation PR before deriveCertificationStatus() can return 'proven').

