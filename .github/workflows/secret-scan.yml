name: Security — Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  secret-scan:
    name: Scan for Hardcoded Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Run secret scanner on full repository
        run: |
          echo "🔒 Scanning full repository for hardcoded secrets..."
          echo "This checks ALL files, not just changed files (backstop for bypassed hooks)"
          echo ""
          bash scripts/check-secrets.sh --all
      
      - name: Security scan passed
        if: success()
        run: |
          echo "✅ No secrets detected in repository"
          echo ""
          echo "This check runs on:"
          echo "  - Every push to main"
          echo "  - Every pull request"
          echo "  - Independent of local pre-commit hooks"
