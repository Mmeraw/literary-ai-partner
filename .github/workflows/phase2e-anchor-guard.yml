name: Phase 2E Anchor Guard

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'PHASE2E_STATUS.md'
      - 'PHASE2E_CANONICAL_EVIDENCE.md'
      - 'LOCK_ANCHORS_POLICY.md'
      - '.github/workflows/phase2e-anchor-guard.yml'

permissions:
  contents: read

jobs:
  verify-anchors:
    name: Verify Phase 2E Anchors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify anchors in PHASE2E_STATUS.md
        shell: bash
        run: |
          set -euo pipefail
          export LC_ALL=C

          file="PHASE2E_STATUS.md"

          # Require the CI lock label + commit to coexist on a line (order-insensitive)
          if ! grep -Eq 'CI Lock Commit.*811fe59|811fe59.*CI Lock Commit' "$file"; then
            echo "❌ ERROR: Expected CI Lock Commit 811fe59 in $file"
            exit 1
          fi

          # Require the docs lock label + commit to coexist on a line (order-insensitive)
          if ! grep -Eq 'Documentation Lock Commit.*e7812b6|e7812b6.*Documentation Lock Commit' "$file"; then
            echo "❌ ERROR: Expected Documentation Lock Commit e7812b6 in $file"
            exit 1
          fi

      - name: Verify anchors in PHASE2E_CANONICAL_EVIDENCE.md
        shell: bash
        run: |
          set -euo pipefail
          export LC_ALL=C

          file="PHASE2E_CANONICAL_EVIDENCE.md"

          if ! grep -Eq 'CI Lock Commit.*811fe59|811fe59.*CI Lock Commit' "$file"; then
            echo "❌ ERROR: Expected CI Lock Commit 811fe59 in $file"
            exit 1
          fi

          if ! grep -Eq 'Documentation Lock Commit.*e7812b6|e7812b6.*Documentation Lock Commit' "$file"; then
            echo "❌ ERROR: Expected Documentation Lock Commit e7812b6 in $file"
            exit 1
          fi

      - name: Verify anchors in LOCK_ANCHORS_POLICY.md registry section
        shell: bash
        run: |
          set -euo pipefail
          export LC_ALL=C

          file="LOCK_ANCHORS_POLICY.md"

          section=$(awk '
            /^### Phase 2E — Canonical user_id RLS migrations$/ {in_section=1; next}
            /^### / && in_section {exit}
            in_section {print}
          ' "$file")

          if [[ -z "$section" ]]; then
            echo "❌ ERROR: Could not locate Phase 2E registry section in $file"
            exit 1
          fi

          if ! grep -Eq '811fe59' <<< "$section"; then
            echo "❌ ERROR: Expected CI lock anchor 811fe59 in Phase 2E registry section of $file"
            exit 1
          fi

          if ! grep -Eq 'e7812b6' <<< "$section"; then
            echo "❌ ERROR: Expected documentation lock anchor e7812b6 in Phase 2E registry section of $file"
            exit 1
          fi

      - name: Anchor guard summary
        run: |
          echo "## ✅ Phase 2E Anchor Guard Passed" >> "$GITHUB_STEP_SUMMARY"
          echo "Anchors preserved: CI=811fe59, Documentation=e7812b6" >> "$GITHUB_STEP_SUMMARY"
