name: canon-authority

on:
  pull_request:
    paths:
      - 'docs/**'
      - '**/*.md'
      - 'scripts/verify-canon-authority.sh'
      - '.github/workflows/canon-authority.yml'
      - '.gitignore'
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run canon authority guard
        run: bash scripts/verify-canon-authority.sh

      - name: Smoke-test guard output contract
        run: bash tests/canon-authority.smoke.sh
