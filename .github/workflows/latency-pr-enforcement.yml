name: Latency PR Enforcement

"on":
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  enforce-latency-template:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read

    steps:
      - name: Classify PR by diff
        id: classify
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // Label-override: pr-type:<type> label wins over diff-based classification.
            const VALID_TYPES = ["evaluation", "ui", "infra", "docs", "migration", "code"];
            const { data: prData } = await github.rest.pulls.get({
              owner, repo, pull_number,
            });
            const labelOverride = (prData.labels || [])
              .map((l) => l.name)
              .find((name) => name.startsWith("pr-type:"));
            if (labelOverride) {
              const overrideType = labelOverride.replace("pr-type:", "").trim();
              if (VALID_TYPES.includes(overrideType)) {
                core.info(`Label override active: ${labelOverride} — skipping diff classification`);
                core.setOutput("type", overrideType);
                core.setOutput("buckets", overrideType);
                return;
              } else {
                core.warning(`Invalid pr-type label "${overrideType}" — falling back to diff classification`);
              }
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            );
            const changed = files.map((f) => f.filename);

            const matchesAny = (name, prefixes) =>
              prefixes.some((p) => name.startsWith(p));

            // ── EVALUATION ────────────────────────────────────────────────
            // Evaluation-pipeline code, workers, schemas, and test coverage.
            const EVAL_PREFIXES = [
              // Core pipeline lib
              "lib/evaluation/",
              "lib/pipeline/",
              "lib/canon/",
              "lib/governance/",
              "lib/invariants/",
              "lib/observability/",
              "lib/monitoring/",
              "lib/reliability/",
              "lib/manuscripts/",
              "lib/llm/",
              "lib/jobs/",
              "lib/release/",
              "lib/artifacts/",
              "lib/config/",
              // Wave scoring modules
              "lib/wave-modules/",
              // App API — pipeline-adjacent
              "app/api/workers/",
              "app/api/evaluations/",
              "app/api/evaluate/",
              "app/api/jobs/",
              "app/api/manuscripts/",
              "app/api/internal/",
              // Evaluation tests (named sub-dirs)
              "tests/canon/",
              "tests/evaluation/",
              "tests/sipoc/",
              "tests/replays/",
              "tests/anchors/",
              "tests/failures/",
              "tests/fixtures/",
              "tests/protected/",
              "tests/jobs/",
              "tests/lib/evaluation/",
              "tests/lib/jobs/",
              "tests/lib/hooks/",
              "tests/api/",
              "tests/benchmarks/",
              "tests/components/",
              "tests/contract/",
              "tests/operations/",
              // Root-level test dirs
              "__tests__/",
              // Data / evidence dirs
              "workers/",
              "schemas/",
              "types/",
              "fixtures/",
              "testdata/",
              "calibration/",
              "evidence/",
              "artifacts/",
              "protected/",
              "prompts/",
              "logs/",
              "stress-results/",
              "manuscripts/",
              "runs/",
              "supabase/functions/",
            ];

            // ── UI ────────────────────────────────────────────────────────
            const UI_PREFIXES = [
              "app/admin/",
              "app/dashboard/",
              "app/evaluate/",
              "app/login/",
              "app/signup/",
              "app/output/",
              "app/reports/",
              "app/revise/",
              "app/share/",
              "app/pricing/",
              "app/marketing-preview/",
              "app/private-beta/",
              "app/resources/",
              "app/storygate/",
              "app/convert/",
              "app/your-writing/",
              "components/",
              "public/",
              "lib/ui/",
              "lib/hooks/",
            ];
            const UI_EXACT = new Set([
              "app/page.tsx",
              "app/page.jsx",
              "app/layout.tsx",
              "app/layout.jsx",
              "app/globals.css",
              "app/robots.txt",
              "index.html",
              "components.json",
            ]);

            // ── CODE ──────────────────────────────────────────────────────
            // Non-pipeline app code (auth, db, admin, etc.)
            const CODE_PREFIXES = [
              "lib/auth/",
              "lib/db/",
              "lib/admin/",
              "lib/security/",
              "lib/operations/",
              "lib/activity/",
              "lib/errors/",
              "lib/supabase/",
              "lib/revision/",
              "lib/reportShares/",
              "src/",
              "entities/",
              "base44/",
              "app/api/auth/",
              "app/api/admin/",
              "app/api/activity/",
              "app/api/report-shares/",
              "app/api/user/",
            ];
            const CODE_EXACT = new Set([
              "lib/audit.js",
              "lib/governance.js",
              "lib/supabase.js",
              "lib/rateLimit.ts",
            ]);

            // ── INFRA ─────────────────────────────────────────────────────
            const INFRA_PREFIXES = [
              ".github/",
              ".vscode/",
              ".githooks/",
              "scripts/",
              "ops/",
              "tests/stress/",
              "tests/playwright/",
              "tests/ui/",
              "tests/scripts/",
              "tests/test-helpers/",
              "tests/config/",
              // App API — health / smoke / dev tooling
              "app/api/dev/",
              "app/api/env-check/",
              "app/api/health/",
              // Supabase config (not migrations or functions)
              "supabase/sql/",
            ];
            const INFRA_EXACT = new Set([
              // Build / package
              "vercel.json",
              "package.json",
              "package-lock.json",
              "pnpm-lock.yaml",
              "yarn.lock",
              // TypeScript configs
              "tsconfig.json",
              "tsconfig.base.json",
              "tsconfig.test.json",
              "tsconfig.workers.json",
              "next-env.d.ts",
              "jsconfig.json",
              // Next.js / framework
              "next.config.js",
              "next.config.mjs",
              "next.config.ts",
              "instrumentation.ts",
              "middleware.ts",
              // Linting / styling
              "eslint.config.js",
              "eslint.config.mjs",
              "tailwind.config.js",
              "tailwind.config.ts",
              "postcss.config.js",
              "postcss.config.mjs",
              // Test runners
              "jest.config.js",
              "jest.setup.ts",
              "vitest.config.ts",
              "vite.config.js",
              // CI / ops
              "lighthouserc.yml",
              "Dockerfile",
              "Makefile",
              ".npmrc",
              ".nvmrc",
              // Supabase non-migration config
              "supabase/.gitignore",
              "supabase/config.toml",
              "supabase/seed.sql",
            ]);

            // ── DOCS ──────────────────────────────────────────────────────
            const DOCS_PREFIXES = ["docs/", "archive/"];

            // ── MIGRATION ─────────────────────────────────────────────────
            const MIGRATION_PREFIXES = [
              "supabase/migrations/",
              "migrations/",          // root-level migration SQL
            ];

            // ── CLASSIFIER ────────────────────────────────────────────────
            const isEval  = (n) => matchesAny(n, EVAL_PREFIXES);
            const isUi    = (n) => matchesAny(n, UI_PREFIXES) || UI_EXACT.has(n);
            const isCode  = (n) => matchesAny(n, CODE_PREFIXES) || CODE_EXACT.has(n);
            const isInfra = (n) => matchesAny(n, INFRA_PREFIXES) || INFRA_EXACT.has(n);
            const isDocs  = (n) =>
              matchesAny(n, DOCS_PREFIXES) ||
              (!n.includes("/") && n.toLowerCase().endsWith(".md"));
            const isMigration = (n) => matchesAny(n, MIGRATION_PREFIXES);

            // Extended catch-all rules for root-level and tests/ flat files
            // that have well-known extensions/patterns but no directory prefix match.
            const isByExtension = (n) => {
              const hasDir = n.includes("/");
              const ext = n.includes(".") ? n.split(".").pop().toLowerCase() : "";
              // Root-level dotfiles (.gitignore, .gitattributes, .env.*, .eslint*) → infra
              if (!hasDir && n.startsWith(".")) return "infra";
              // Root-level shell scripts → infra
              if (!hasDir && ext === "sh") return "infra";
              // tests/ flat shell scripts → infra
              if (n.startsWith("tests/") && !n.slice(6).includes("/") && ext === "sh") return "infra";
              // Root-level *.test.ts / *.test.js → eval
              if (!hasDir && (ext === "ts" || ext === "js") && n.includes(".test.")) return "eval";
              // Root-level *.json (data snapshots, criteria matrices, evidence) → eval
              if (!hasDir && ext === "json") return "eval";
              // Root-level *.sql → migration
              if (!hasDir && ext === "sql") return "migration";
              // Root-level *.txt / *.csv / *.sh / evidence text → docs
              if (!hasDir && (ext === "txt" || ext === "csv")) return "docs";
              // tests/ flat *.test.ts (one level deep only, no subdir) → eval
              if (n.startsWith("tests/") && !n.slice(6).includes("/")) return "eval";
              // Anything else extensionless at root → infra
              if (!hasDir && !n.includes(".")) return "infra";
              return null;
            };

            const anyEval = changed.some(isEval);

            let type;
            if (anyEval) {
              type = "evaluation";
            } else {
              const buckets = new Set();
              for (const n of changed) {
                if      (isUi(n))        buckets.add("ui");
                else if (isInfra(n))     buckets.add("infra");
                else if (isDocs(n))      buckets.add("docs");
                else if (isMigration(n)) buckets.add("migration");
                else if (isCode(n))      buckets.add("code");
                else {
                  const ext = isByExtension(n);
                  if      (ext === "eval")      buckets.add("eval_catchall");
                  else if (ext === "infra")     buckets.add("infra");
                  else if (ext === "docs")      buckets.add("docs");
                  else if (ext === "migration") buckets.add("migration");
                  else                          buckets.add("unclassified");
                }
              }

              // If any eval catchall hit, treat as evaluation
              if (buckets.has("eval_catchall")) {
                buckets.delete("eval_catchall");
                buckets.add("evaluation");
              }

              if (buckets.has("evaluation") || buckets.has("unclassified")) {
                if (buckets.has("unclassified")) {
                  const unclassifiedFiles = changed.filter((n) => {
                    if (isEval(n) || isUi(n) || isCode(n) || isInfra(n) || isDocs(n) || isMigration(n)) return false;
                    return isByExtension(n) === null;
                  });
                  core.warning(
                    `Unclassified path(s) detected — falling back to strict evaluation validator.\n` +
                    `Files: ${unclassifiedFiles.join(", ")}\n` +
                    `Update docs/PR_TEMPLATE_TYPED_SCOPE_GOVERNANCE.md to extend the taxonomy.`
                  );
                }
                type = "evaluation";
              } else if (buckets.size === 1) {
                type = [...buckets][0];
              } else {
                type = "mixed";
                core.setOutput("buckets", [...buckets].join(","));
              }
            }

            core.info(`Changed files: ${changed.length}`);
            core.info(`Classified PR type: ${type}`);
            core.setOutput("type", type);

      - name: Validate PR body
        uses: actions/github-script@v7
        with:
          script: |
            const { owner } = context.repo;
            const type = "${{ steps.classify.outputs.type }}";
            const buckets = "${{ steps.classify.outputs.buckets }}";
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const labels = (pr.labels || []).map((label) => label.name);

            const failures = [];
            const assert = (cond, msg) => { if (!cond) failures.push(msg); };

            const hasSection = (h) => body.includes(h);
            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const stripHtmlComments = (value) => value.replace(/<!--[\s\S]*?-->/g, "");
            const extractSectionBody = (heading) => {
              const start = body.indexOf(heading);
              if (start === -1) return null;

              const afterHeading = body.slice(start + heading.length);
              const nextHeadingIndex = afterHeading.search(/\n##\s+/);
              const raw = nextHeadingIndex === -1
                ? afterHeading
                : afterHeading.slice(0, nextHeadingIndex);

              return raw.split(/\n---\s*\n/)[0].trim();
            };
            const normalizeSectionBody = (value) =>
              stripHtmlComments(value)
                .replace(/^\s*[-*]\s*$/gm, "")
                .trim();
            const isPlaceholderOnly = (value) => {
              const compact = value.toLowerCase().replace(/\s+/g, " ").trim();
              if (!compact) return true;

              return (
                ["tbd", "todo", "pending", "unknown", "placeholder", "lorem ipsum", "na", "n/a"].includes(compact) ||
                /^tbd\b/.test(compact) ||
                /^todo\b/.test(compact)
              );
            };
            const isExplainedNa = (value) => /^(n\/a|na)\s*[—:-]\s*\S.{8,}$/i.test(value.trim());
            const assertMeaningfulSection = (heading, label = heading.replace(/^##\s+/, "")) => {
              assert(hasSection(heading), `Missing: ${label} section`);

              const raw = extractSectionBody(heading);
              const normalized = normalizeSectionBody(raw || "");

              assert(normalized.length > 0, `${label} must not be blank`);
              assert(!isPlaceholderOnly(normalized), `${label} must not be placeholder-only (for example: TBD)`);

              if (/^(n\/a|na)$/i.test(normalized)) {
                assert(false, `${label} must explain why it is N/A`);
                return;
              }

              if (/^(n\/a|na)\b/i.test(normalized)) {
                assert(isExplainedNa(normalized), `${label} must use \"N/A — <reason>\" when not applicable`);
              }
            };
            const hasNoPipelineImpact = () => {
              const m = body.match(/^No-Pipeline-Impact:\s*(.+)$/m);
              return !!(m && m[1].trim().length > 0);
            };
            const HOTFIX_TRUST_PROOF_BYPASS_LABEL = "hotfix:trust-proof-bypass";
            const validateHotfixBypass = () => {
              if (!labels.includes(HOTFIX_TRUST_PROOF_BYPASS_LABEL)) return false;

              const justification = body.match(/^Hotfix-Justification:\s*(.+)$/m);
              const approvedBy = body.match(/^Hotfix-Approved-By:\s*@?([A-Za-z0-9_.-]+)\s*$/m);

              assert(
                !!justification && justification[1].trim().length > 0,
                `Hotfix bypass requires \"Hotfix-Justification: <reason>\" when label ${HOTFIX_TRUST_PROOF_BYPASS_LABEL} is set`
              );
              assert(
                !!approvedBy,
                `Hotfix bypass requires \"Hotfix-Approved-By: @${owner}\" when label ${HOTFIX_TRUST_PROOF_BYPASS_LABEL} is set`
              );
              if (approvedBy) {
                assert(
                  approvedBy[1].toLowerCase() === owner.toLowerCase(),
                  `Hotfix bypass must be approved by @${owner}`
                );
              }

              const approved =
                !!justification && justification[1].trim().length > 0 &&
                !!approvedBy && approvedBy[1].toLowerCase() === owner.toLowerCase();

              if (approved) {
                core.warning(
                  `Auditable hotfix bypass active via label ${HOTFIX_TRUST_PROOF_BYPASS_LABEL} approved by @${owner}`
                );
              }

              return approved;
            };
            const hotfixBypassApproved = validateHotfixBypass();

            const validateMandatoryTrustProof = () => {
              if (hotfixBypassApproved) return;

              assertMeaningfulSection("## Unauthorized Input Sources");
              assertMeaningfulSection("## Internal Process Leakage");
              assertMeaningfulSection("## Input → Action → Output");
              assertMeaningfulSection("## Public-Safe Quality/Status Metrics");
              assertMeaningfulSection("## Runtime/Pipeline Expansion");
              assertMeaningfulSection("## Latency Impact");
            };

            const validateMigrationSpecificProof = () => {
              if (hotfixBypassApproved) return;

              assertMeaningfulSection("## Rollback Posture");
              assertMeaningfulSection("## Lock / Table-Scan Risk");
              assertMeaningfulSection("## Data Backfill Risk");
              assertMeaningfulSection("## RLS / Access Impact");
              assertMeaningfulSection("## Production Verification Query");
            };

            const commonFloor = () => {
              assert(hasSection("## Summary"), "Missing: Summary section");
              assert(hasSection("## Scope"), "Missing: Scope section");
              assert(hasSection("## Branch Freshness (Never Behind)"), "Missing: Branch Freshness (Never Behind) section");
              const branchBehindLine = body.match(/^Branch-Behind-Base:\s*(\d+)\s*$/m);
              assert(!!branchBehindLine, 'Missing: Branch-Behind-Base: <integer> line');
              if (branchBehindLine) {
                assert(branchBehindLine[1] === "0", "Branch-Behind-Base must be 0 before merge");
              }
              assert(hasSection("## Risks & Anomalies"), "Missing: Risks & Anomalies section");
            };

            const validateEvaluation = () => {
              commonFloor();
              assert(hasSection("## Summary"), "Missing: Summary section");
              assert(hasSection("## Scope"), "Missing: Scope section");
              assert(
                hasSection("## Evaluation Process Change Declaration"),
                "Missing: Evaluation Process Change Declaration section"
              );
              assert(hasSection("## Contract Integrity"), "Missing: Contract Integrity section");
              assert(hasSection("## Behavioral Quality"), "Missing: Behavioral Quality section");
              assert(hasSection("## Latency Evidence"), "Missing: Latency Evidence section");

              const processChangeMatch = body.match(/^Process Change:\s*(yes|no)\s*$/im);
              assert(
                !!processChangeMatch,
                'Missing or invalid process declaration: use "Process Change: yes" or "Process Change: no"'
              );

              const processChangeYes = !!processChangeMatch && processChangeMatch[1].toLowerCase() === "yes";
              if (processChangeYes) {
                const requiredCheckedItems = [
                  "Sequential phase-gate doctrine preserved (parallelism only within safe sub-workloads).",
                  "Phase 0 remains first and is proven before downstream processing.",
                  "Phase 2 remains blocked on accepted_story_ledger_v1 (Review Gate authority).",
                  "Phase 3 remains blocked on pass12_handoff_v1 and is sole owner of Pass 3B synthesis.",
                  "Deterministic quality gates run after Pass 3B and before completion.",
                  "WAVE remains post-evaluation (after evaluation_result_v2) and non-fatal to base evaluation.",
                ];

                for (const item of requiredCheckedItems) {
                  const escaped = item.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
                  const checkedRe = new RegExp(`^-\\s*\\[[xX]\\]\\s*${escaped}\\s*$`, "m");
                  assert(checkedRe.test(body), `Process Change requires checked item: ${item}`);
                }

                assert(
                  body.includes("One-line doctrine: The pipeline is sequential at the phase/gate level and parallel only inside safe sub-workloads."),
                  "Missing one-line doctrine statement for process-change PR"
                );

                const impactSummaryMatch = body.match(
                  /^Process-Change Impact Summary \(required when Process Change: yes\):\s*[\r\n]+-\s*(.+)$/im
                );
                assert(
                  !!impactSummaryMatch && impactSummaryMatch[1].trim() !== "",
                  "Process Change requires a non-empty Process-Change Impact Summary"
                );
              }

              assert(
                body.includes("Baseline (Pre-change)") && body.includes("Post-change Runs"),
                "Missing latency evidence tables (baseline + post-change runs)"
              );
              assert(body.includes("Run 1"), "Missing: Run 1 evidence");
              assert(body.includes("Run 2"), "Missing: Run 2 evidence");

              const isPass1 = body.includes("[x] Pass 1") || body.includes("[X] Pass 1");
              const isPass2 = body.includes("[x] Pass 2") || body.includes("[X] Pass 2");
              const isPass3 = body.includes("[x] Pass 3") || body.includes("[X] Pass 3");
              assert(isPass1 || isPass2 || isPass3, "You must select Pass 1, Pass 2, or Pass 3");

              assert(/pass\d?_?ms|passX_ms/.test(body), "Missing pass latency metric");
              assert(body.includes("total_ms"), "Missing total_ms metric");
              if (isPass3) {
                assert(
                  body.includes("criteria_count_by_state"),
                  "Pass 3 PRs must include divergence distribution (criteria_count_by_state)"
                );
              }
              assert(
                body.includes("QG_") || body.includes("quality gate") || body.includes("Quality Gate"),
                "Missing quality gate / anomaly disclosure"
              );
              assert(
                body.includes("not reducing intelligence"),
                "Missing final principle: must acknowledge quality preservation rule"
              );
            };

            const validateUi = () => {
              commonFloor();
              assertMeaningfulSection("## Summary");
              assertMeaningfulSection("## Scope");
              assertMeaningfulSection("## Visual Evidence");
              assertMeaningfulSection("## Accessibility");
              assertMeaningfulSection("## Browser Targets");
              assertMeaningfulSection("## Risks & Anomalies");
              validateMandatoryTrustProof();
              assert(hasNoPipelineImpact(), "Missing: No-Pipeline-Impact: <value> line");
            };

            const validateInfra = () => {
              commonFloor();
              assertMeaningfulSection("## Summary");
              assertMeaningfulSection("## Scope");
              assertMeaningfulSection("## CI/Infra Scope");
              assertMeaningfulSection("## Rollback Plan");
              assertMeaningfulSection("## Affected Workflows");
              assertMeaningfulSection("## Risks & Anomalies");
              validateMandatoryTrustProof();
              assert(hasNoPipelineImpact(), "Missing: No-Pipeline-Impact: <value> line");
            };

            const validateDocs = () => {
              commonFloor();
              assertMeaningfulSection("## Summary");
              assertMeaningfulSection("## Scope");
              assertMeaningfulSection("## Risks & Anomalies");
              validateMandatoryTrustProof();
              assert(hasNoPipelineImpact(), "Missing: No-Pipeline-Impact: <value> line");
            };

            const validateMigration = () => {
              commonFloor();
              assertMeaningfulSection("## Summary");
              assertMeaningfulSection("## Scope");
              assertMeaningfulSection("## Schema Diff");
              assertMeaningfulSection("## Rollback Plan");
              assertMeaningfulSection("## Data Backfill");
              assertMeaningfulSection("## Risks & Anomalies");
              validateMandatoryTrustProof();
              validateMigrationSpecificProof();
              assert(hasNoPipelineImpact(), "Missing: No-Pipeline-Impact: <value> line");
            };

            const validateCode = () => {
              commonFloor();
              assertMeaningfulSection("## Summary");
              assertMeaningfulSection("## Scope");
              assertMeaningfulSection("## Tests Updated");
              assertMeaningfulSection("## Risks & Anomalies");
              validateMandatoryTrustProof();
              assert(hasNoPipelineImpact(), "Missing: No-Pipeline-Impact: <value> line");
            };

            const VALIDATORS = {
              evaluation: validateEvaluation,
              ui: validateUi,
              infra: validateInfra,
              docs: validateDocs,
              migration: validateMigration,
              code: validateCode,
            };

            core.info(`Running ${type} validator`);
            if (type === "mixed") {
              const types = buckets.split(",").filter(Boolean);
              core.info(`Mixed buckets: ${types.join(", ")}`);
              for (const t of types) {
                if (VALIDATORS[t]) {
                  core.info(`Running mixed-${t} validator`);
                  VALIDATORS[t]();
                }
              }
            } else if (VALIDATORS[type]) {
              VALIDATORS[type]();
            } else {
              core.setFailed(`Unknown PR type: ${type}`);
              return;
            }

            if (failures.length > 0) {
              for (const f of failures) core.error(f);
              core.setFailed(`${failures.length} validation failure(s) for PR type "${type}"`);
            } else {
              core.info(`✅ PR body passes ${type} validator`);
            }
