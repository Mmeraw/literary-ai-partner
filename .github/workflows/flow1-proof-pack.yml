name: Flow 1 Proof Pack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flow1-proof-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install deps
        run: npm ci

      - name: Start Supabase (local)
        run: supabase start

      - name: Export Supabase env for CI
        shell: bash
        run: |
          set -euo pipefail

          echo "== supabase status =="
          supabase status || true

          echo "== supabase status -o env =="
          ENV_OUT="$(supabase status -o env || true)"
          echo "$ENV_OUT"

          if [ -z "${ENV_OUT}" ]; then
            echo "::error::supabase status -o env returned empty output. Local Supabase is not running in CI."
            exit 1
          fi

          # Persist for subsequent steps
          echo "$ENV_OUT" >> "$GITHUB_ENV"

          # Load into THIS step (more reliable than eval for 'export VAR=...')
          source <(echo "$ENV_OUT")

          # Assertions (clear failure instead of 'unbound variable')
          : "${SUPABASE_URL:?Missing SUPABASE_URL after sourcing ENV_OUT}"
          : "${SUPABASE_ANON_KEY:?Missing SUPABASE_ANON_KEY after sourcing ENV_OUT}"

          echo "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> "$GITHUB_ENV"

          # Service role should come from secrets; do not depend on local status output
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> "$GITHUB_ENV"

          # Keep if your app expects it in both names
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> "$GITHUB_ENV"

          echo "CRON_SECRET=test-cron-secret-for-flow1-proof" >> "$GITHUB_ENV"

      - name: Start Next.js server (port 3002)
        run: |
          set -euo pipefail

          PORT=3002 npm run dev &
          npx --yes wait-on http://127.0.0.1:3002

      - name: Run Flow 1 proof pack (Jest)
        run: npm test -- tests/flow1-proof-pack.test.ts --testTimeout=180000
        env:
          FLOW1_BASE_URL: http://127.0.0.1:3002
          CRON_SECRET: test-cron-secret-for-flow1-proof

      - name: Stop Supabase
        if: always()
        run: supabase stop
