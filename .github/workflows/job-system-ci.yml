name: Job System CI

on:
  push:
    branches:
      - main
      - develop
      - "feat/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  proof-availability:
    name: Check Proof Gate Availability
    runs-on: ubuntu-latest
    outputs:
      secrets_ok: ${{ steps.check.outputs.secrets_ok }}
    steps:
      - name: Check Supabase CI secrets present
        id: check
        shell: bash
        env:
          SUPABASE_URL_VAL: ${{ secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY_VAL: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF_VAL: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN_VAL: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL_VAL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_PASSWORD_VAL: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=0
          [[ -z "$SUPABASE_URL_VAL" ]] && echo "❌ Missing SUPABASE_URL" && missing=1
          [[ -z "$SUPABASE_SERVICE_ROLE_KEY_VAL" ]] && echo "❌ Missing SUPABASE_SERVICE_ROLE_KEY" && missing=1
          [[ -z "$SUPABASE_PROJECT_REF_VAL" ]] && echo "❌ Missing SUPABASE_PROJECT_REF" && missing=1
          [[ -z "$SUPABASE_ACCESS_TOKEN_VAL" ]] && echo "❌ Missing SUPABASE_ACCESS_TOKEN" && missing=1
          [[ -z "$SUPABASE_DB_URL_VAL" ]] && echo "❌ Missing SUPABASE_DB_URL" && missing=1
          if [[ -z "$SUPABASE_DB_PASSWORD_VAL" && -z "$SUPABASE_DB_URL_VAL" ]]; then
            echo "Missing SUPABASE_DB_PASSWORD and no SUPABASE_DB_URL to derive from"
            missing=1
          elif [[ -z "$SUPABASE_DB_PASSWORD_VAL" ]]; then
            echo "SUPABASE_DB_PASSWORD not set; will derive from SUPABASE_DB_URL at runtime"
          fi
          if [ "$missing" -eq 1 ]; then
            echo "secrets_ok=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Supabase proof gates cannot run (secrets missing)"
          else
            echo "secrets_ok=true" >> "$GITHUB_OUTPUT"
            echo "✅ Supabase proof gates can run (secrets present)"
          fi

  enforce-proof-on-main:
    name: Enforce Proof Gates on Main
    needs: proof-availability
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.proof-availability.outputs.secrets_ok != 'true' }}
    steps:
      - name: Fail because proof gates cannot run
        run: |
          echo "❌ PROOF GATES REQUIRED BUT UNAVAILABLE"
          echo "Supabase proof gates are required on main. Add canonical repository secrets."
          exit 1

  job-system-tests:
    name: Job System Smoke Tests & Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Debug Supabase URL
        run: echo "NEXT_PUBLIC_SUPABASE_URL length=${#NEXT_PUBLIC_SUPABASE_URL}"
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Enforce ESM runtime rules
        run: bash scripts/no-require-server-runtime.sh
      - name: Install dependencies
        run: npm ci
      - name: Audit (allow known advisories if documented)
        shell: bash
        run: |
          set -eu
          if npm audit --audit-level=high >/dev/null 2>&1; then
            echo "npm audit (high) clean ✅"
            exit 0
          fi
          (npm audit --json 2>&1 || true) | node -e '
            const fs = require("fs");
            const data = fs.readFileSync(0, "utf8");
            if (!data || !data.trim()) {
              console.error("npm audit returned no JSON; cannot validate allowlist.");
              process.exit(1);
            }
            let j;
            try { j = JSON.parse(data); } catch (e) {
              console.error("Failed to parse npm audit JSON:", e.message);
              process.exit(1);
            }
            const vulns = j.vulnerabilities || {};
            const keys = Object.keys(vulns);
            const allow = ["tar", "supabase", "next", "eslint", "ajv", "flatted", "minimatch", "socket.io-parser", "engine.io-client", "socket.io-client", "ws", "underscore", "@xmldom/xmldom", "xmldom", "brace-expansion", "lodash", "picomatch", "axios", "@base44/sdk", "postcss", "uuid", "xlsx", "@playwright/test", "playwright"];
            const bad = keys.filter(k => !allow.some(a => k === a || k.includes(a)));
            if (bad.length) {
              console.error("Unexpected high vulns:", bad);
              process.exit(1);
            }
            const notesPath = "docs/NPM_AUDIT_NOTES.md";
            if (!fs.existsSync(notesPath)) {
              console.error("Missing docs/NPM_AUDIT_NOTES.md for approved advisories.");
              process.exit(1);
            }
            console.log("Only approved advisories remain (documented in NPM_AUDIT_NOTES.md) ✅");
          '
      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key-for-build"
      - name: Verify zero-drift (no manual duplication)
        run: npm run verify:zero-drift
      - name: Verify ALLOW_HEADER_USER_ID never in production configs
        shell: bash
        run: |
          set -euo pipefail
          WORKFLOWS=(".github/workflows/ci.yml" ".github/workflows/ci-staging-tests.yml" ".github/workflows/job-system-ci.yml")
          FAIL=0
          for workflow in "${WORKFLOWS[@]}"; do
            if matches=$(rg -n "^\s+ALLOW_HEADER_USER_ID:\s*true" "$workflow" 2>/dev/null); then
              while IFS= read -r line; do
                linenum=$(echo "$line" | cut -d: -f1)
                context=$(sed -n "$((linenum-3)),$((linenum))p" "$workflow")
                if echo "$context" | grep -qiE "(#.*CI|#.*dev|#.*smoke|#.*test)"; then
                  echo "✅ $workflow:$linenum - Allowed"
                else
                  echo "❌ $workflow:$linenum - No CI/dev justification"
                  FAIL=1
                fi
              done <<< "$matches"
            fi
          done
          exit "$FAIL"
      - name: Verify Phase A5 Day 2 (backpressure + cost)
        run: bash scripts/verify-phase-a5-day2.sh
      - name: Start dev server in background
        run: |
          npm run dev > /tmp/dev-server.log 2>&1 &
          echo $! > /tmp/dev-server.pid
          timeout 60 bash -c 'until curl -sf http://localhost:3002/api/health; do sleep 1; done'
        env:
          JOB_SYSTEM_ENV: ci
          USE_SUPABASE_JOBS: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # CI smoke tests: allow x-user-id auth bypass
          ALLOW_HEADER_USER_ID: true
      - name: Run Phase 1 smoke test
        run: npm run jobs:smoke
        env:
          USE_SUPABASE_JOBS: false
          BASE_URL: http://localhost:3002
      - name: Run Phase 2 smoke test
        run: npm run jobs:smoke:phase2
        env:
          USE_SUPABASE_JOBS: false
          BASE_URL: http://localhost:3002
      - name: Validate job invariants
        run: node scripts/jobs-validate-invariants.mjs
        env:
          USE_SUPABASE_JOBS: false
          BASE_URL: http://localhost:3002
      - name: Run lease contention test
        run: npm run jobs:test:contention
        env:
          USE_SUPABASE_JOBS: false
          BASE_URL: http://localhost:3002
      - name: Run cancellation test
        run: npm run jobs:test:cancel
        env:
          USE_SUPABASE_JOBS: false
          BASE_URL: http://localhost:3002
      - name: Run retry backoff test
        run: npm run jobs:test:retry
      - name: Run metrics safety test
        run: npm run jobs:test:metrics
      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: dev-server-logs
          path: /tmp/dev-server.log
          retention-days: 7
      - name: Cleanup
        if: always()
        run: |
          if [ -f /tmp/dev-server.pid ]; then
            kill "$(cat /tmp/dev-server.pid)" || true
          fi

  supabase-backed-tests:
    name: Supabase-Backed Job Tests
    needs: proof-availability
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ needs.proof-availability.outputs.secrets_ok == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Create artifacts directory
        run: mkdir -p scripts-artifacts
      - name: Install Supabase CLI
        shell: bash
        run: |
          set -euo pipefail
          SUPABASE_VERSION="v2.90.0"
          SUPABASE_TARBALL="supabase_linux_amd64.tar.gz"
          SUPABASE_URL="https://github.com/supabase/cli/releases/download/${SUPABASE_VERSION}/${SUPABASE_TARBALL}"
          SUPABASE_SHA256="34e264108d0502f922f2a11c4481d512335e8a6b621c8d8c25524eb9f25e9576"
          curl -fsSL "$SUPABASE_URL" -o /tmp/$SUPABASE_TARBALL
          echo "${SUPABASE_SHA256}  /tmp/${SUPABASE_TARBALL}" | sha256sum -c -
          tar -xzf /tmp/$SUPABASE_TARBALL -C /tmp
          sudo install -m 0755 /tmp/supabase /usr/local/bin/supabase
          supabase --version
      - name: Validate migration prerequisites
        id: migration_prereqs
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]] && missing+=("SUPABASE_ACCESS_TOKEN")
          [[ -z "${SUPABASE_PROJECT_REF:-}" ]] && missing+=("SUPABASE_PROJECT_REF")
          [[ -z "${SUPABASE_DB_URL:-}" ]] && missing+=("SUPABASE_DB_URL")
          EFFECTIVE_DB_PASSWORD="${SUPABASE_DB_PASSWORD:-}"
          if [[ -z "${EFFECTIVE_DB_PASSWORD}" && -n "${SUPABASE_DB_URL:-}" ]]; then
            DERIVED_DB_PASSWORD="$(python3 -c 'import os, urllib.parse; u=os.environ.get("SUPABASE_DB_URL", ""); print(urllib.parse.unquote(urllib.parse.urlparse(u).password or "") if u else "")')"
            [[ -n "${DERIVED_DB_PASSWORD}" ]] && EFFECTIVE_DB_PASSWORD="${DERIVED_DB_PASSWORD}"
          fi
          [[ -z "${EFFECTIVE_DB_PASSWORD}" ]] && missing+=("SUPABASE_DB_PASSWORD")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Migration prerequisites missing: ${missing[*]}"
            echo "prereqs_ok=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "prereqs_ok=true" >> "$GITHUB_OUTPUT"
      - name: Apply migrations to CI Supabase
        if: steps.migration_prereqs.outputs.prereqs_ok == 'true'
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_DB_PASSWORD:-}" ]]; then
            export SUPABASE_DB_PASSWORD="$(python3 -c 'import os, urllib.parse; u=os.environ.get("SUPABASE_DB_URL", ""); print(urllib.parse.unquote(urllib.parse.urlparse(u).password or "") if u else "")')"
          fi
          supabase link --project-ref "${SUPABASE_PROJECT_REF}" --yes
          supabase migration list --linked | grep -oE '20[0-9]{12}' | sort -u | while read -r migration; do
            if ! ls "supabase/migrations/${migration}_"*.sql >/dev/null 2>&1; then
              echo "Found remote-only migration ${migration} → marking reverted"
              supabase migration repair --status reverted "${migration}"
            fi
          done
          : > scripts-artifacts/supabase-db-push.log
          set +o pipefail
          (yes || true) | supabase db push --include-all 2>&1 | tee -a scripts-artifacts/supabase-db-push.log
          PIPESTAT=("${PIPESTATUS[@]}")
          set -o pipefail
          SUPABASE_EXIT="${PIPESTAT[1]:-99}"
          if [ "$SUPABASE_EXIT" -ne 0 ]; then
            tail -200 scripts-artifacts/supabase-db-push.log || true
            exit "$SUPABASE_EXIT"
          fi
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -c "SELECT pg_notify('pgrst', 'reload schema');" 2>&1 | tee scripts-artifacts/postgrest-reload.log || true
          sleep 2
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -c "SELECT n.nspname AS schema, p.proname AS function_name, pg_get_function_identity_arguments(p.oid) AS type_signature FROM pg_proc p JOIN pg_namespace n ON n.oid = p.pronamespace WHERE n.nspname = 'public' AND p.proname = 'claim_job_atomic' ORDER BY type_signature;" 2>&1 | tee scripts-artifacts/claim_job_atomic_overloads.log || true
      - name: Check CI DB migrations (proof gate)
        run: |
          set -o pipefail
          npm run jobs:check-migrations 2>&1 | tee scripts-artifacts/db-migration-check.log
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Run Supabase DB contract tests
        run: |
          set -o pipefail
          npm run jobs:smoke:supabase 2>&1 | tee scripts-artifacts/supabase-contract-smoke.log
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Run admin retry concurrency test
        run: |
          set -o pipefail
          npm run jobs:admin-retry:concurrency 2>&1 | tee scripts-artifacts/admin-retry-concurrency.log
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Upload Supabase contract test logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: supabase-contract-test-logs
          path: scripts-artifacts/*.log
          retention-days: 30
