name: Job System CI

on:
  push:
    branches:
      - main
      - develop
      - "feat/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PROOF AVAILABILITY GATE
  # Enforces audit-grade governance: CI cannot be green when proof gates are skipped
  # ═══════════════════════════════════════════════════════════════════════════
  proof-availability:
    name: Check Proof Gate Availability
    runs-on: ubuntu-latest
    outputs:
      secrets_ok: ${{ steps.check.outputs.secrets_ok }}
    steps:
      - name: Check Supabase CI secrets present
        id: check
        shell: bash
        # Accepts _CI-suffixed names or plain fallbacks — whichever the repo has configured.
        env:
          SUPABASE_URL_VAL: ${{ secrets.SUPABASE_URL_CI || secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY_VAL: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_CI || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_REF_VAL: ${{ secrets.SUPABASE_PROJECT_REF_CI || secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN_VAL: ${{ secrets.SUPABASE_ACCESS_TOKEN_CI || secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL_VAL: ${{ secrets.SUPABASE_DB_URL_CI || secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_PASSWORD_VAL: ${{ secrets.SUPABASE_DB_PASSWORD_CI || secrets.SUPABASE_DB_PASSWORD }}
        run: |
          missing=0

          if [[ -z "$SUPABASE_URL_VAL" ]]; then
            echo "❌ Missing SUPABASE_URL_CI (or SUPABASE_URL / NEXT_PUBLIC_SUPABASE_URL fallback)"
            missing=1
          fi

          if [[ -z "$SUPABASE_SERVICE_ROLE_KEY_VAL" ]]; then
            echo "❌ Missing SUPABASE_SERVICE_ROLE_KEY_CI (or SUPABASE_SERVICE_ROLE_KEY fallback)"
            missing=1
          fi

          # Required for supabase link/db push in CI
          if [[ -z "$SUPABASE_PROJECT_REF_VAL" ]]; then
            echo "❌ Missing SUPABASE_PROJECT_REF_CI (or SUPABASE_PROJECT_REF fallback)"
            missing=1
          fi

          # Required for Supabase CLI auth in CI
          if [[ -z "$SUPABASE_ACCESS_TOKEN_VAL" ]]; then
            echo "❌ Missing SUPABASE_ACCESS_TOKEN_CI (or SUPABASE_ACCESS_TOKEN fallback)"
            missing=1
          fi

          # Required for direct DB verification queries (psql)
          if [[ -z "$SUPABASE_DB_URL_VAL" ]]; then
            echo "❌ Missing SUPABASE_DB_URL_CI (or SUPABASE_DB_URL fallback)"
            missing=1
          fi

          # Required for Supabase CLI auth during migration operations
          # DB password can be derived from DB URL at runtime; only fail if BOTH are missing
          if [[ -z "$SUPABASE_DB_PASSWORD_VAL" && -z "$SUPABASE_DB_URL_VAL" ]]; then
            echo "Missing SUPABASE_DB_PASSWORD_CI and no SUPABASE_DB_URL to derive from"
            missing=1
          elif [[ -z "$SUPABASE_DB_PASSWORD_VAL" ]]; then
            echo "SUPABASE_DB_PASSWORD not set; will derive from SUPABASE_DB_URL at runtime"
          fi
          if [ "$missing" -eq 1 ]; then
            echo "secrets_ok=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Supabase proof gates cannot run (secrets missing)"
          else
            echo "secrets_ok=true" >> "$GITHUB_OUTPUT"
            echo "✅ Supabase proof gates can run (secrets present)"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # PROOF GATE ENFORCEMENT
  # On main branch: FAIL if proof gates cannot run (audit-grade requirement)
  # On PRs: Allow (forks don't have secrets, that's normal)
  # ═══════════════════════════════════════════════════════════════════════════
  enforce-proof-on-main:
    name: Enforce Proof Gates on Main
    needs: proof-availability
    runs-on: ubuntu-latest
    # Only enforce on push to main when secrets are missing
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.proof-availability.outputs.secrets_ok != 'true' }}
    steps:
      - name: Fail because proof gates cannot run
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "  ❌ PROOF GATES REQUIRED BUT UNAVAILABLE"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "Supabase proof gates are required on the main branch, but secrets"
          echo "are not configured. This violates audit-grade governance:"
          echo ""
          echo "  • Green CI without proof is worse than red CI"
          echo "  • Proof gates must run or explicitly fail"
          echo "  • No silent skipping of validation"
          echo ""
          echo "Required secrets (prefer _CI names; plain names accepted as fallback):"
          echo "  • SUPABASE_URL_CI          (or SUPABASE_URL / NEXT_PUBLIC_SUPABASE_URL)"
          echo "  • SUPABASE_SERVICE_ROLE_KEY_CI (or SUPABASE_SERVICE_ROLE_KEY)"
          echo "  • SUPABASE_PROJECT_REF_CI  (or SUPABASE_PROJECT_REF)"
          echo "  • SUPABASE_ACCESS_TOKEN_CI (or SUPABASE_ACCESS_TOKEN)"
          echo "  • SUPABASE_DB_URL_CI       (or SUPABASE_DB_URL)"
          echo "  • SUPABASE_DB_PASSWORD_CI  (or SUPABASE_DB_PASSWORD)"
          echo ""
          echo "Resolution:"
          echo "  If you have one Supabase project, configure ANY of the above name pairs."
          echo "  Both _CI-suffixed and plain names are accepted — the workflow falls back."
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          exit 1

  job-system-tests:
    name: Job System Smoke Tests & Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug SUPABASE_URL_CI
        run: |
          echo "SUPABASE_URL_CI: '${SUPABASE_URL_CI}'"
          echo "NEXT_PUBLIC_SUPABASE_URL: '${NEXT_PUBLIC_SUPABASE_URL}'"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Enforce ESM runtime rules
        run: bash scripts/no-require-server-runtime.sh
      - name: Install dependencies
        run: npm ci

      - name: Audit (allow known tar advisory if documented)
        shell: bash
        run: |
          set -eu

          # Fast path: no high vulns.
          if npm audit --audit-level=high >/dev/null 2>&1; then
            echo "npm audit (high) clean ✅"
            exit 0
          fi

          # Controlled path: audit is failing; pipe JSON directly to validation script.
          (npm audit --json 2>&1 || true) | node -e '
            const fs = require("fs");

            const data = fs.readFileSync(0, "utf8");
            if (!data || !data.trim()) {
              console.error("npm audit returned no JSON; cannot validate allowlist.");
              process.exit(1);
            }

            let j;
            try {
              j = JSON.parse(data);
            } catch (e) {
              console.error("Failed to parse npm audit JSON:", e.message);
              process.exit(1);
            }

            const vulns = j.vulnerabilities || {};
            const keys = Object.keys(vulns);

          const allow = ["tar", "supabase", "next", "eslint", "ajv", "flatted", "minimatch", "socket.io-parser", "underscore", "@xmldom/xmldom", "xmldom", "brace-expansion", "lodash", "picomatch", "axios"];
          const bad = keys.filter(k => !allow.some(a => k === a || k.includes(a)));
            if (bad.length) {
              console.error("Unexpected high vulns:", bad);
              process.exit(1);
            }

            if (!keys.some(k => allow.some(a => k === a || k.includes(a)))) {
              console.error("High vuln present but not in approved allowlist? keys:", keys);
              process.exit(1);
            }

            const notesPath = "docs/NPM_AUDIT_NOTES.md";
            if (!fs.existsSync(notesPath)) {
              console.error("Missing docs/NPM_AUDIT_NOTES.md for approved advisories.");
              process.exit(1);
            }

            console.log("Only approved advisories remain (documented in NPM_AUDIT_NOTES.md) ✅");
          '

          exit 0

      - name: Build Next.js app
        run: npm run build
        env:
          # Placeholder env vars for build - actual Supabase not needed for memory store tests
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key-for-build"

      - name: Verify zero-drift (no manual duplication)
        run: npm run verify:zero-drift

      - name: Verify ALLOW_HEADER_USER_ID never in production configs
        shell: bash
        run: |
          set -euo pipefail

          echo "🔍 Checking ALLOW_HEADER_USER_ID in all workflow files..."
          echo "   Policy: Auth bypass only allowed in CI/dev contexts with explicit comment"
          echo ""

          # Deterministic check: scan all workflows explicitly (no heuristics)
          WORKFLOWS=(
            ".github/workflows/ci.yml"
            ".github/workflows/ci-staging-tests.yml"
            ".github/workflows/job-system-ci.yml"
          )

          FAIL=0
          for workflow in "${WORKFLOWS[@]}"; do
            # Find env: sections with ALLOW_HEADER_USER_ID=true (actual config, not script content)
            if matches=$(rg -n "^\s+ALLOW_HEADER_USER_ID:\s*true" "$workflow" 2>/dev/null); then
              while IFS= read -r line; do
                linenum=$(echo "$line" | cut -d: -f1)

                # Get previous 3 lines for context (to find comment)
                context=$(sed -n "$((linenum-3)),$((linenum))p" "$workflow")

                # Allow if context contains CI/dev/smoke/test justification
                if echo "$context" | grep -qiE "(#.*CI|#.*dev|#.*smoke|#.*test)"; then
                  echo "   ✅ $workflow:$linenum - Allowed (CI/dev/test context)"
                else
                  echo "   ❌ FAIL: $workflow:$linenum - No CI/dev justification"
                  echo "      Line: $(sed -n "${linenum}p" "$workflow")"
                  FAIL=1
                fi
              done <<< "$matches"
            fi
          done

          if [ $FAIL -eq 1 ]; then
            echo ""
            echo "❌ Found ALLOW_HEADER_USER_ID=true without CI/dev/test justification"
            echo "   Add comment like: # Allow x-user-id auth bypass for CI smoke tests"
            exit 1
          fi

          echo ""
          echo "✅ PASS: All ALLOW_HEADER_USER_ID usages properly justified"

      - name: Verify Phase A5 Day 2 (backpressure + cost)
        run: bash scripts/verify-phase-a5-day2.sh

      - name: Start dev server in background
        run: |
          npm run dev > /tmp/dev-server.log 2>&1 &
          echo $! > /tmp/dev-server.pid
          # Wait for server to be ready
          timeout 60 bash -c 'until curl -sf http://localhost:3002/api/health; do sleep 1; done'
        env:
          JOB_SYSTEM_ENV: ci
          USE_SUPABASE_JOBS: true

          # Client-side (Next public) — accepts _CI name or plain fallback
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL_CI || secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_CI || secrets.SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

          # Server-side (admin) — accepts _CI name or plain fallback
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_CI || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_CI || secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # CI smoke tests: allow x-user-id auth bypass
          ALLOW_HEADER_USER_ID: true

      - name: Run Phase 1 smoke test
        run: npm run jobs:smoke
        env:
          USE_SUPABASE_JOBS: false
          BASE_URL: http://localhost:3002

      - name: Run Phase 2 smoke test
        run: npm run jobs:smoke:phase2
        env:
          USE_SUPABASE_JOBS: false
          BASE_URL: http://localhost:3002

      - name: Validate job invariants
        run: node scripts/jobs-validate-invariants.mjs
        env:
          USE_SUPABASE_JOBS: false
          BASE_URL: http://localhost:3002

      - name: Run lease contention test
        run: npm run jobs:test:contention
        env:
          USE_SUPABASE_JOBS: false
          BASE_URL: http://localhost:3002

      - name: Run cancellation test
        run: npm run jobs:test:cancel
        env:
          USE_SUPABASE_JOBS: false
          BASE_URL: http://localhost:3002

      - name: Run retry backoff test
        run: npm run jobs:test:retry

      - name: Run metrics safety test
        run: npm run jobs:test:metrics

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-server-logs
          path: /tmp/dev-server.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          if [ -f /tmp/dev-server.pid ]; then
            kill "$(cat /tmp/dev-server.pid)" || true
          fi

  supabase-backed-tests:
    name: Supabase-Backed Job Tests
    needs: proof-availability
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # DB contract tests only - no worker/storage infrastructure required
    # Tests: claim RPC contention, lease blocking, status transitions, progress counters
    # Only runs if secrets are available (enforced by proof-availability gate)
    if: ${{ needs.proof-availability.outputs.secrets_ok == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create artifacts directory
        run: mkdir -p scripts-artifacts

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to CI Supabase
        continue-on-error: true
        run: |
          set -euo pipefail

          echo "════════════════════════════════════════════════════════"
          echo "  Applying Repo Migrations to CI Supabase"
          echo "════════════════════════════════════════════════════════"

          # Supabase CLI requires SUPABASE_DB_PASSWORD for temp-role login.
          # Prefer explicit CI secret; otherwise derive from DB URL when available.
          if [[ -z "${SUPABASE_DB_PASSWORD:-}" ]]; then
            DERIVED_DB_PASSWORD="$(python3 -c 'import os, urllib.parse; u=os.environ.get("SUPABASE_DB_URL_CI", ""); print(urllib.parse.unquote(urllib.parse.urlparse(u).password or "") if u else "")')"
            if [[ -n "${DERIVED_DB_PASSWORD}" ]]; then
              export SUPABASE_DB_PASSWORD="${DERIVED_DB_PASSWORD}"
              echo "✅ Derived SUPABASE_DB_PASSWORD from SUPABASE_DB_URL_CI"
            else
              echo "❌ Missing SUPABASE_DB_PASSWORD and could not derive from SUPABASE_DB_URL_CI"
              exit 1
            fi
          else
            echo "✅ Using SUPABASE_DB_PASSWORD from CI secret"
          fi

          # Link to CI project
          supabase link --project-ref "${SUPABASE_PROJECT_REF}" --yes

          echo "→ Drift recovery: repairing remote-only migrations (test DB only)"
          # Expected remote migration IDs are the first underscore-delimited token in filenames:
          # e.g. 20260131000000_admin_retry_job_atomic_rpc.sql -> 20260131000000
          # We mark any remote migration IDs not present locally as reverted.
          supabase migration list --linked \
            | grep -oE '20[0-9]{12}' \
            | sort -u \
            | while read -r migration; do
                if ! ls "supabase/migrations/${migration}_"*.sql >/dev/null 2>&1; then
                  echo "Found remote-only migration ${migration} → marking reverted (CI drift recovery)"
                  supabase migration repair --status reverted "${migration}"
                fi
              done

          echo "→ Pushing repo migrations"
          # Note: --yes flag doesn't work reliably across CLI versions; pipe 'yes' for non-interactive
          # Capture supabase exit code without letting pipefail kill step before we inspect PIPESTATUS
          : > scripts-artifacts/supabase-db-push.log
          
          set +o pipefail
          (yes || true) | supabase db push --include-all 2>&1 | tee -a scripts-artifacts/supabase-db-push.log
          PIPESTAT=("${PIPESTATUS[@]}")
          set -o pipefail
          
          # PIPESTATUS: [0]=yes exit, [1]=supabase exit, [2]=tee exit
          # Only [1] (supabase) matters; yes dying from SIGPIPE is expected
          SUPABASE_EXIT="${PIPESTAT[1]:-99}"
          
          echo "Pipeline exit codes: yes=${PIPESTAT[0]:-NA}, supabase=${SUPABASE_EXIT}, tee=${PIPESTAT[2]:-NA}"
          
          if [ "$SUPABASE_EXIT" -eq 0 ]; then
            echo "✅ Migrations applied successfully (supabase exit 0)"
          else
            echo "❌ supabase db push failed (exit $SUPABASE_EXIT). Last 200 lines of log:"
            tail -200 scripts-artifacts/supabase-db-push.log || true

            # Fallback: if password-auth path fails but DB URL is present, retry direct DB URL push.
            # This avoids false negatives when SUPABASE_DB_PASSWORD drifts but DB URL secret is valid.
            if [[ -n "${SUPABASE_DB_URL_CI:-}" ]]; then
              echo "↻ Retrying migrations via direct --db-url path"
              : > scripts-artifacts/supabase-db-push-fallback.log

              set +o pipefail
              (yes || true) | supabase db push --db-url "$SUPABASE_DB_URL_CI" --include-all 2>&1 | tee -a scripts-artifacts/supabase-db-push-fallback.log
              FALLBACK_PIPESTAT=("${PIPESTATUS[@]}")
              set -o pipefail

              FALLBACK_EXIT="${FALLBACK_PIPESTAT[1]:-99}"
              echo "Fallback pipeline exit codes: yes=${FALLBACK_PIPESTAT[0]:-NA}, supabase=${FALLBACK_EXIT}, tee=${FALLBACK_PIPESTAT[2]:-NA}"

              if [[ "$FALLBACK_EXIT" -eq 0 ]]; then
                echo "✅ Fallback db push via --db-url succeeded"
              else
                echo "❌ Fallback db push failed (exit $FALLBACK_EXIT). Last 200 lines of fallback log:"
                tail -200 scripts-artifacts/supabase-db-push-fallback.log || true
                exit "$FALLBACK_EXIT"
              fi
            else
              exit "$SUPABASE_EXIT"
            fi
          fi

          echo "→ Forcing PostgREST schema cache reload via SQL notification"
          # Use SELECT pg_notify() which works better across network conditions than NOTIFY
          if psql "$SUPABASE_DB_URL_CI" -v ON_ERROR_STOP=1 -c "SELECT pg_notify('pgrst', 'reload schema');" 2>&1 | tee scripts-artifacts/postgrest-reload.log; then
            echo "✅ PostgREST reload notification sent"
          else
            echo "⚠️  PostgREST reload via psql failed; continuing (smoke tests will validate)"
          fi
          sleep 2

          echo "→ Audit proof: claim_job_atomic function signatures"
          # Note: Direct psql queries may fail due to network constraints in CI.
          # Primary validation occurs in smoke tests that call RPC via PostgREST.
          # This is informational only; test failures are authoritative.
          psql "$SUPABASE_DB_URL_CI" -v ON_ERROR_STOP=1 -c "
          SELECT
            n.nspname AS schema,
            p.proname AS function_name,
            pg_get_function_identity_arguments(p.oid) AS type_signature,
            array_agg(pn) FILTER (WHERE pn IS NOT NULL) AS param_names
          FROM pg_proc p
          JOIN pg_namespace n ON n.oid = p.pronamespace
          CROSS JOIN LATERAL (
            SELECT unnest(proargnames) AS pn
            FROM pg_proc WHERE oid = p.oid
          ) pargs
          WHERE n.nspname = 'public'
            AND p.proname = 'claim_job_atomic'
          GROUP BY 1, 2, 3
          ORDER BY type_signature;
          " 2>&1 | tee scripts-artifacts/claim_job_atomic_overloads.log || echo "⚠️  Audit query failed; smoke tests are authoritative"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN_CI || secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_CI || secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_URL_CI: ${{ secrets.SUPABASE_DB_URL_CI || secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_CI || secrets.SUPABASE_DB_PASSWORD }}

      - name: Check CI DB migrations (proof gate)
        run: |
          set -o pipefail
          npm run jobs:check-migrations 2>&1 | tee scripts-artifacts/db-migration-check.log
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_CI || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_CI || secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run Supabase DB contract tests
        run: |
          set -o pipefail
          npm run jobs:smoke:supabase 2>&1 | tee scripts-artifacts/supabase-contract-smoke.log
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_CI || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_CI || secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run admin retry concurrency test
        run: |
          set -o pipefail
          npm run jobs:admin-retry:concurrency 2>&1 | tee scripts-artifacts/admin-retry-concurrency.log
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_CI || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_CI || secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload Supabase contract test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-contract-test-logs
          path: scripts-artifacts/*.log
          # retention-days: keep logs for 30 days
          retention-days: 30
