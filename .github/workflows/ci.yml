name: CI

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key-for-build"

      - name: Test
        run: npm test -- --runInBand --no-coverage --bail
        env:
          CI: true

  governance:
    runs-on: ubuntu-latest
    env:
      CANON_VERSION: v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Install ripgrep (required for canon-audit)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Canon governance audit
        run: ./scripts/canon-audit.sh
      - name: A5 Day 2 verification (backpressure + cost)
        run: bash scripts/verify-phase-a5-day2.sh

  smoke-test:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      JOBSYSTEM_ENV: ci
      SUPABASE_URL: ${{ secrets.SUPABASE_URL_CI }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_CI }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_CI }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL_CI }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_CI }}
      USE_SUPABASE_JOBS: "true"
      TEST_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Audit (allow known tar advisory if documented)
        shell: bash
        run: |
          set -eu
          if npm audit --audit-level=high >/dev/null 2>&1; then
            echo "npm audit (high) clean ✅"
            exit 0
          fi
          (npm audit --json 2>&1 || true) | node -e '
            const fs = require("fs");
            const data = fs.readFileSync(0, "utf8");
            if (!data || !data.trim()) {
              console.error("npm audit returned no JSON; cannot validate allowlist.");
              process.exit(1);
            }
            let j;
            try {
              j = JSON.parse(data);
            } catch (e) {
              console.error("Failed to parse npm audit JSON:", e.message);
              process.exit(1);
            }
            const vulns = j.vulnerabilities || {};
            const keys = Object.keys(vulns);
            const allow = ["tar", "supabase", "next", "eslint", "ajv", "flatted", "minimatch", "socket.io-parser", "underscore"];
            const bad = keys.filter(k => !allow.some(a => k === a || k.includes(a)));
            if (bad.length) {
              console.error("Unexpected high vulns:", bad);
              process.exit(1);
            }
            if (!keys.some(k => allow.some(a => k === a || k.includes(a)))) {
              console.error("High vuln present but not tar/supabase/next? keys:", keys);
              process.exit(1);
            }
            const notesPath = "docs/NPM_AUDIT_NOTES.md";
            if (!fs.existsSync(notesPath)) {
              console.error("Missing docs/NPM_AUDIT_NOTES.md for approved tar/supabase/next advisories.");
              process.exit(1);
            }
            console.log("Only known tar/supabase/next advisories remain (documented in NPM_AUDIT_NOTES.md) ✅");
          '
          exit 0
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key-for-build"
      - run: npm test
