name: CI

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lease write contract guard
        run: bash scripts/check-lease-writes.sh

      - name: Eval2 persistence boundary guard
        run: npm run guard:eval2-persistence-boundary

      - name: Hardening contract guard
        run: npm run guard:hardening-contract

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key-for-build"
          EVAL_OPENAI_TIMEOUT_MS: "180000"
          EVAL_PASS_TIMEOUT_MS: "180000"

      - name: Gate replay (strict codes)
        run: npm run gate:replay -- --run-dir tests/fixtures/gate-replay/ch11b_pass

      - name: Story Ledger gold fixture benchmark gate
        run: npm run test:benchmark:story-ledger-gold-fixtures
        env:
          CI: true

      - name: Test
        run: npm test -- --runInBand --no-coverage --bail
        env:
          CI: true

  governance:
    runs-on: ubuntu-latest
    env:
      CANON_VERSION: v1
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm ci
      - name: Install ripgrep (required for canon-audit)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Canon governance audit
        run: ./scripts/canon-audit.sh
      - name: A5 Day 2 verification (backpressure + cost)
        run: bash scripts/verify-phase-a5-day2.sh

  smoke-test:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      JOBSYSTEM_ENV: ci
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      USE_SUPABASE_JOBS: "true"
      TEST_MODE: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm ci
      - name: Audit (allow known advisories if documented)
        shell: bash
        run: |
          set -eu
          if npm audit --audit-level=high >/dev/null 2>&1; then
            echo "npm audit (high) clean ✅"
            exit 0
          fi
          (npm audit --json 2>&1 || true) | node scripts/validate-npm-audit-notes.mjs
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key-for-build"
          EVAL_OPENAI_TIMEOUT_MS: "180000"
          EVAL_PASS_TIMEOUT_MS: "180000"
      - run: npm test
