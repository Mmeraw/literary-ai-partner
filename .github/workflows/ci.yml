name: CI


on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
  pull_request:
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0


      # Early exit: skip heavy build/test for docs/benchmark-only PRs
      - name: Check PR scope
        id: scope
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null || git diff --name-only origin/${{ github.base_ref }}...HEAD)
          NON_DOC=$(echo "$FILES" | grep -vE '^(docs/|archive/|\.github/PULL_REQUEST_TEMPLATE/|\.github/pr-bodies/|README\.md|CONTRIBUTING\.md|LICENSE)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs/benchmark-only PR — skipping build and test."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}


      - name: Skip notice
        if: steps.scope.outputs.skip == 'true'
        run: echo "CI build and test skipped — no code changes in this PR."


      - name: Setup Node
        if: steps.scope.outputs.skip != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm


      - name: Install
        if: steps.scope.outputs.skip != 'true'
        run: npm ci


      - name: Lease write contract guard
        if: steps.scope.outputs.skip != 'true'
        run: bash scripts/check-lease-writes.sh


      - name: Eval2 persistence boundary guard
        if: steps.scope.outputs.skip != 'true'
        run: npm run guard:eval2-persistence-boundary


      - name: Hardening contract guard
        if: steps.scope.outputs.skip != 'true'
        run: npm run guard:hardening-contract


      - name: Build
        if: steps.scope.outputs.skip != 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key-for-build"
          EVAL_OPENAI_TIMEOUT_MS: "180000"
          EVAL_PASS_TIMEOUT_MS: "180000"


      - name: Gate replay (strict codes)
        if: steps.scope.outputs.skip != 'true'
        run: npm run gate:replay -- --run-dir tests/fixtures/gate-replay/ch11b_pass


      - name: Story Ledger gold fixture benchmark gate
        if: steps.scope.outputs.skip != 'true'
        run: npm run test:benchmark:story-ledger-gold-fixtures
        env:
          CI: true


      - name: Test
        if: steps.scope.outputs.skip != 'true'
        run: npm test -- --runInBand --no-coverage --bail
        env:
          CI: true
      - name: Semantic parity gate (UED to ViewModel to renderer)
        if: steps.scope.outputs.skip != 'true'
        run: npm run test:parity
        env:
          CI: true
  governance:
    runs-on: ubuntu-latest
    env:
      CANON_VERSION: v1
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0


      # Early exit: skip governance checks for docs/benchmark-only PRs
      - name: Check PR scope
        id: scope
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only 2>/dev/null || git diff --name-only origin/${{ github.base_ref }}...HEAD)
          NON_DOC=$(echo "$FILES" | grep -vE '^(docs/|archive/|\.github/PULL_REQUEST_TEMPLATE/|\.github/pr-bodies/|README\.md|CONTRIBUTING\.md|LICENSE)' || true)
          if [ -z "$NON_DOC" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs/benchmark-only PR — skipping governance checks."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}


      - name: Skip notice
        if: steps.scope.outputs.skip == 'true'
        run: echo "Governance checks skipped — no code changes in this PR."


      - uses: actions/setup-node@v5
        if: steps.scope.outputs.skip != 'true'
        with:
          node-version: "24"
      - name: Install
        if: steps.scope.outputs.skip != 'true'
        run: npm ci
      - name: Install ripgrep (required for canon-audit)
        if: steps.scope.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Canon governance audit
        if: steps.scope.outputs.skip != 'true'
        run: ./scripts/canon-audit.sh
      - name: A5 Day 2 verification (backpressure + cost)
        if: steps.scope.outputs.skip != 'true'
        run: bash scripts/verify-phase-a5-day2.sh


  smoke-test:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      JOBSYSTEM_ENV: ci
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      USE_SUPABASE_JOBS: "true"
      TEST_MODE: "true"
      ALLOW_HEADER_USER_ID: "true"
      SMOKE_USER_ID: ${{ secrets.SMOKE_USER_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: npm ci
      - name: Audit (allow known advisories if documented)
        shell: bash
        run: |
          set -eu
          if npm audit --audit-level=high >/dev/null 2>&1; then
            echo "npm audit (high) clean ✅"
            exit 0
          fi
          (npm audit --json 2>&1 || true) | node scripts/validate-npm-audit-notes.mjs
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EVAL_OPENAI_TIMEOUT_MS: "180000"
          EVAL_PASS_TIMEOUT_MS: "180000"


      - name: Start app server for real smoke
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          setsid npm run start -- -p 3000 > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid
      - name: Wait for API health
        shell: bash
        run: |
          set -eu
          for i in {1..90}; do
            if curl -fsS --connect-timeout 2 --max-time 5 http://127.0.0.1:3000/api/health >/dev/null; then
              echo "API health ready"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Local API health check timed out"
          tail -n 200 /tmp/next-start.log || true
          exit 1
      - name: Real manuscript end-to-end evaluation smoke
        timeout-minutes: 30
        env:
          BASE_URL: "http://127.0.0.1:3000"
          MANUSCRIPT_ID: ${{ secrets.SMOKE_MANUSCRIPT_ID }}
        run: |
          if [ -z "${MANUSCRIPT_ID}" ]; then
            echo "::error::Missing required secret SMOKE_MANUSCRIPT_ID for jobs:smoke:real"
            exit 1
          fi
          npm run jobs:smoke:real
      - name: Real manuscript end-to-end evaluation smoke – Let the River Decide (ID2)
        timeout-minutes: 30
        env:
          BASE_URL: "http://127.0.0.1:3000"
          MANUSCRIPT_ID: ${{ secrets.SMOKE_MANUSCRIPT_ID2 }}
        run: |
          if [ -z "${MANUSCRIPT_ID}" ]; then
            echo "::error::Missing required secret SMOKE_MANUSCRIPT_ID2 for jobs:smoke:real (ID2)"
            exit 1
          fi
          npm run jobs:smoke:real
      - name: Stop app server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/next-start.pid ]; then
            kill -- "-$(cat /tmp/next-start.pid)" || true
          fi
      - run: npm test
