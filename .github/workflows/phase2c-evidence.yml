name: Phase 2C Evidence Gate

on:
  workflow_dispatch:  # Allow manual trigger
  pull_request:
    branches: [ main ]
    paths:
      - 'workers/**'
      - 'types/providerCalls.ts'
      - 'phase2c1-runtime-proof.test.ts'
      - 'phase2c4-persistence.test.ts'
      - 'tsconfig.json'
      - 'tsconfig.workers.json'
  push:
    branches: [ main ]
    paths:
      - 'workers/**'
      - 'types/providerCalls.ts'
      - 'phase2c1-runtime-proof.test.ts'
      - 'phase2c4-persistence.test.ts'
      - 'tsconfig.json'
      - 'tsconfig.workers.json'

jobs:
  evidence:
    name: Phase 2C Evidence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Phase 2C Evidence
        id: evidence
        run: |
          set +e
          OUTPUT="$(npm run evidence:phase2c 2>&1)"
          STATUS=$?
          set -e
          echo "$OUTPUT"
          
          # Extract log path from output
          LOG_PATH=$(echo "$OUTPUT" | grep "Evidence archived:" | awk '{print $3}')
          
          # Copy to artifacts directory for upload
          mkdir -p artifacts
          if [ -n "$LOG_PATH" ] && [ -f "$LOG_PATH" ]; then
            cp "$LOG_PATH" artifacts/phase2c-evidence-ci.log
            echo "LOG_COPIED=true" >> $GITHUB_OUTPUT
          else
            echo "LOG_COPIED=false" >> $GITHUB_OUTPUT
          fi
          
          exit $STATUS
      
      - name: Upload Evidence Artifact
        if: always() && steps.evidence.outputs.LOG_COPIED == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: phase2c-evidence-${{ github.sha }}
          path: artifacts/phase2c-evidence-ci.log
          retention-days: 90
      
      - name: Evidence Summary
        if: success()
        run: |
          echo "## ✅ Phase 2C Evidence: LOCKED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** All checks passed" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript (main) | ✅ Clean |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript (workers) | ✅ Clean |" >> $GITHUB_STEP_SUMMARY
          echo "| Phase 2C-1 Runtime | ✅ 15/15 tests |" >> $GITHUB_STEP_SUMMARY
          echo "| Phase 2C-4 Persistence | ✅ 17/17 tests |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total:** 32/32 tests passing" >> $GITHUB_STEP_SUMMARY
      
      - name: Failure Summary
        if: failure()
        run: |
          echo "## ❌ Phase 2C Evidence: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Evidence gate failed" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details on which step failed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Common issues:**" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript errors (check \`npx tsc -p tsconfig.json\`)" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 2C-1 test failures (circuit breaker, retry logic)" >> $GITHUB_STEP_SUMMARY
          echo "- Phase 2C-4 test failures (persistence schema, normalizer)" >> $GITHUB_STEP_SUMMARY
