name: Phase 2D Evidence Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'workers/**'
      - 'supabase/migrations/**'
      - 'scripts/evidence-phase2d.sh'
      - 'phase2d1-atomic-claim-concurrency.test.ts'
      - 'phase2d2-idempotency-proof.test.ts'
      - 'phase2d3-reconciler-proof.test.ts'
      - 'tsconfig.json'
      - 'tsconfig.workers.json'
      - 'package.json'
  push:
    branches: [ main ]
    paths:
      - 'workers/**'
      - 'supabase/migrations/**'
      - 'scripts/evidence-phase2d.sh'
      - 'phase2d1-atomic-claim-concurrency.test.ts'
      - 'phase2d2-idempotency-proof.test.ts'
      - 'phase2d3-reconciler-proof.test.ts'
      - 'tsconfig.json'
      - 'tsconfig.workers.json'
      - 'package.json'

jobs:
  evidence:
    name: Phase 2D Evidence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 2D Evidence (Slice 1-3)
        id: evidence
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set +e
          OUTPUT="$(npm run evidence:phase2d 2>&1)"
          STATUS=$?
          set -e
          echo "$OUTPUT"

          LOG_PATH=$(echo "$OUTPUT" | grep "Evidence archived:" | awk '{print $3}')
          mkdir -p artifacts
          if [ -n "$LOG_PATH" ] && [ -f "$LOG_PATH" ]; then
            cp "$LOG_PATH" artifacts/phase2d-evidence-ci.log
            echo "LOG_COPIED=true" >> $GITHUB_OUTPUT
          else
            echo "LOG_COPIED=false" >> $GITHUB_OUTPUT
          fi

          exit $STATUS

      - name: Upload Evidence Artifact
        if: always() && steps.evidence.outputs.LOG_COPIED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: phase2d-evidence-${{ github.sha }}
          path: artifacts/phase2d-evidence-ci.log
          retention-days: 90

      - name: Evidence Summary
        if: success()
        run: |
          echo "## ✅ Phase 2D Evidence: LOCKED (Slice 1-3)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** All checks passed" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript (main) | ✅ Clean |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript (workers) | ✅ Clean |" >> $GITHUB_STEP_SUMMARY
          echo "| Phase 2D-1 Concurrency | ✅ 1/1 test |" >> $GITHUB_STEP_SUMMARY
          echo "| Phase 2D-2 Idempotency | ✅ 2/2 tests |" >> $GITHUB_STEP_SUMMARY
          echo "| Phase 2D-3 Reconciler | ✅ 4/4 tests |" >> $GITHUB_STEP_SUMMARY

      - name: Failure Summary
        if: failure()
        run: |
          echo "## ❌ Phase 2D Evidence: FAILED (Slice 1-3)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Evidence gate failed" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details on which step failed." >> $GITHUB_STEP_SUMMARY
