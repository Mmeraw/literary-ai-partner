name: Phase 2D Evidence Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/phase2d-evidence.yml'
      - 'workers/**'
      - 'supabase/migrations/**'
      - 'scripts/evidence-phase2d.sh'
      - 'phase2d1-atomic-claim-concurrency.test.ts'
      - 'phase2d2-idempotency-proof.test.ts'
      - 'phase2d3-reconciler-proof.test.ts'
      - 'tsconfig.json'
      - 'tsconfig.workers.json'
      - 'package.json'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/phase2d-evidence.yml'
      - 'workers/**'
      - 'supabase/migrations/**'
      - 'scripts/evidence-phase2d.sh'
      - 'phase2d1-atomic-claim-concurrency.test.ts'
      - 'phase2d2-idempotency-proof.test.ts'
      - 'phase2d3-reconciler-proof.test.ts'
      - 'tsconfig.json'
      - 'tsconfig.workers.json'
      - 'package.json'

jobs:
  evidence:
    name: Phase 2D Evidence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify secrets are present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "Secret presence check:"
          [ -n "$SUPABASE_URL" ] && echo "  ✓ SUPABASE_URL present" || echo "  ✗ SUPABASE_URL MISSING"
          [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && echo "  ✓ NEXT_PUBLIC_SUPABASE_URL present" || echo "  ✗ NEXT_PUBLIC_SUPABASE_URL MISSING"
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && echo "  ✓ SUPABASE_SERVICE_ROLE_KEY present" || echo "  ✗ SUPABASE_SERVICE_ROLE_KEY MISSING"
          [ -n "$SUPABASE_ANON_KEY" ] && echo "  ✓ SUPABASE_ANON_KEY present" || echo "  ✗ SUPABASE_ANON_KEY MISSING"
          [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && echo "  ✓ NEXT_PUBLIC_SUPABASE_ANON_KEY present" || echo "  ✗ NEXT_PUBLIC_SUPABASE_ANON_KEY MISSING"
          echo ""
          # Fail if any critical secret is missing
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "ERROR: Critical secrets are missing"
            exit 1
          fi

      - name: Run Phase 2D Evidence (Slice 1-3)
        id: evidence
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          PHASE2D_SKIP_TS_MAIN: '1'
        run: |
          set +e
          # Export env vars BEFORE npm to ensure they propagate to all subprocesses
          export SUPABASE_URL="$SUPABASE_URL"
          export NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL"
          export SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY"
          export SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          
          npm run evidence:phase2d > /tmp/evidence_output.log 2>&1
          STATUS=$?
          set -e
          cat /tmp/evidence_output.log
          
          OUTPUT=$(cat /tmp/evidence_output.log)
          LOG_PATH=$(echo "$OUTPUT" | grep "Evidence archived:" | awk '{print $3}')
          mkdir -p artifacts
          if [ -n "$LOG_PATH" ] && [ -f "$LOG_PATH" ]; then
            cp "$LOG_PATH" artifacts/phase2d-evidence-ci.log
            echo "LOG_COPIED=true" >> $GITHUB_OUTPUT
          else
            echo "LOG_COPIED=false" >> $GITHUB_OUTPUT
          fi

          exit $STATUS

      - name: Upload Evidence Artifact
        if: always() && steps.evidence.outputs.LOG_COPIED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: phase2d-evidence-${{ github.sha }}
          path: artifacts/phase2d-evidence-ci.log
          retention-days: 90

      - name: Evidence Summary
        if: success()
        run: |
          echo "## ✅ Phase 2D Evidence: LOCKED (Slice 1-3)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** All checks passed" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Scope Contract:** This gate is Phase 2D evidence-slice scoped and does not assert full-repo TypeScript correctness when PHASE2D_SKIP_TS_MAIN=1." >> $GITHUB_STEP_SUMMARY
          echo "**Effective Scope Flag:** PHASE2D_SKIP_TS_MAIN=1" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript (main) | ⏭️ Scoped out in CI (Phase 2D evidence) |" >> $GITHUB_STEP_SUMMARY
          echo "| Phase 2D-1 Concurrency | ✅ 1/1 test |" >> $GITHUB_STEP_SUMMARY
          echo "| Phase 2D-2 Idempotency | ✅ 2/2 tests |" >> $GITHUB_STEP_SUMMARY
          echo "| Phase 2D-3 Reconciler | ✅ 4/4 tests |" >> $GITHUB_STEP_SUMMARY

      - name: Failure Summary
        if: failure()
        run: |
          echo "## ❌ Phase 2D Evidence: FAILED (Slice 1-3)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Evidence gate failed" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Scope Contract:** Phase 2D evidence-slice scoped; full-repo TypeScript correctness is out of scope in CI when PHASE2D_SKIP_TS_MAIN=1." >> $GITHUB_STEP_SUMMARY
          echo "**Effective Scope Flag:** PHASE2D_SKIP_TS_MAIN=1" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details on which step failed." >> $GITHUB_STEP_SUMMARY
