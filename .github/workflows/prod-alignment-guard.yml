name: Production Alignment Guard

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      apply_supabase_migrations:
        description: "Apply Supabase production migrations (requires production environment approval)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: prod-alignment-guard
  cancel-in-progress: false

jobs:
  verify-vercel-prod-head:
    name: Verify Vercel Production = main HEAD
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_PROD_ALIAS: ${{ secrets.VERCEL_PROD_ALIAS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve expected HEAD SHA
        id: expected
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          EXPECTED_SHA="$(git rev-parse origin/main)"
          echo "expected_sha=${EXPECTED_SHA}" >> "$GITHUB_OUTPUT"
          echo "Expected origin/main SHA: ${EXPECTED_SHA}"

      - name: Verify required Vercel secrets
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${VERCEL_TOKEN:-}" ]] || { echo "Missing VERCEL_TOKEN"; exit 1; }
          [[ -n "${VERCEL_PROJECT_ID:-}" ]] || { echo "Missing VERCEL_PROJECT_ID"; exit 1; }
          [[ -n "${VERCEL_PROD_ALIAS:-}" ]] || { echo "Missing VERCEL_PROD_ALIAS"; exit 1; }

      - name: Verify Vercel production deployment at expected SHA
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_SHA="${{ steps.expected.outputs.expected_sha }}"
          NORMALIZED_ALIAS="${VERCEL_PROD_ALIAS#https://}"
          NORMALIZED_ALIAS="${NORMALIZED_ALIAS#http://}"
          NORMALIZED_ALIAS="${NORMALIZED_ALIAS%/}"

          # ── Fast-path: check current production deployment first ─────────────
          # Vercel triggers its own deployment on push to main. By the time this
          # job reaches this step, the deployment is often already READY.
          # We check once immediately and exit 0 if it already matches — avoiding
          # the 15-minute polling loop on every trivial push (CI fixes, doc edits).
          #
          # Slow-path: if not yet ready, poll for up to 10 minutes (was 15).
          # Root cause of needing any wait: Vercel cold-build time, not CI lag.
          # Do NOT increase the deadline — fix build time instead if it's exceeded.

          vercel_api() {
            local url="$1"
            local body_file
            body_file="$(mktemp)"
            HTTP_STATUS="$(curl -sS -o "$body_file" -w '%{http_code}' \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "$url" || true)"
            HTTP_BODY="$(cat "$body_file")"
            rm -f "$body_file"
          }

          print_recent_production_deployments() {
            local url="https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=production&limit=5"
            vercel_api "$url"
            if [[ "$HTTP_STATUS" != 2* ]]; then
              echo "Could not fetch recent Vercel production deployments for diagnostics (HTTP $HTTP_STATUS)." >&2
              printf '%s\n' "$HTTP_BODY" >&2
              return 0
            fi
            echo "Recent Vercel production deployments for project ${VERCEL_PROJECT_ID}:"
            printf '%s' "$HTTP_BODY" | jq -r '
              (.deployments // [])[]
              | "- id=\(.uid // .id // \"\") state=\(.state // .readyState // \"UNKNOWN\") url=\(.url // \"\") sha=\(.meta.githubCommitSha // \"\") created=\(.createdAt // \"\")"
            '
          }

          resolve_deployment() {
            local alias_url="https://api.vercel.com/v4/aliases/${NORMALIZED_ALIAS}"
            local alias_json deploy_id meta_json ready_state deploy_sha deploy_url deploy_project_id

            vercel_api "$alias_url"
            if [[ "$HTTP_STATUS" == "404" ]]; then
              echo ""
              return 0
            fi
            if [[ "$HTTP_STATUS" != 2* ]]; then
              echo "::error::Failed to resolve Vercel production alias ${NORMALIZED_ALIAS} (HTTP $HTTP_STATUS)." >&2
              printf '%s\n' "$HTTP_BODY" >&2
              return 2
            fi

            alias_json="$HTTP_BODY"
            DEPLOY_ID="$(printf '%s' "$alias_json" | jq -r '.deployment.id // .deployment.uid // .deploymentId // ""')"
            if [[ -z "$DEPLOY_ID" ]]; then
              echo ""
              return
            fi

            vercel_api "https://api.vercel.com/v13/deployments/$DEPLOY_ID"
            if [[ "$HTTP_STATUS" != 2* ]]; then
              echo "::error::Failed to inspect Vercel deployment $DEPLOY_ID (HTTP $HTTP_STATUS)." >&2
              printf '%s\n' "$HTTP_BODY" >&2
              return 2
            fi

            meta_json="$HTTP_BODY"
            ready_state="$(printf '%s' "$meta_json" | jq -r '.readyState // .state // "UNKNOWN"')"
            deploy_sha="$(printf '%s' "$meta_json" | jq -r '.meta.githubCommitSha // ""')"
            deploy_url="$(printf '%s' "$meta_json" | jq -r '.url // ""')"
            deploy_project_id="$(printf '%s' "$meta_json" | jq -r '.projectId // .project.id // ""')"

            if [[ -n "$deploy_project_id" && "$deploy_project_id" != "$VERCEL_PROJECT_ID" ]]; then
              echo "::error::Alias ${NORMALIZED_ALIAS} points to project ${deploy_project_id}, expected ${VERCEL_PROJECT_ID}." >&2
              return 2
            fi

            echo "${DEPLOY_ID}|${READY_STATE}|${DEPLOY_SHA}|${deploy_url}"
          }

          check_match() {
            local info="$1"
            [[ -z "$info" ]] && return 1
            local state sha url
            state="$(echo "$info" | cut -d'|' -f2)"
            sha="$(echo "$info" | cut -d'|' -f3)"
            url="$(echo "$info" | cut -d'|' -f4)"
            echo "Alias: $NORMALIZED_ALIAS | Deployment: $(echo "$info" | cut -d'|' -f1) | state=$state | sha=$sha | url=$url"
            [[ "$state" == "READY" && "$sha" == "$EXPECTED_SHA" ]]
          }

          # Fast-path check
          DEPLOY_INFO="$(resolve_deployment)"
          if check_match "$DEPLOY_INFO"; then
            echo "✅ Fast-path: Vercel production already at origin/main SHA: $EXPECTED_SHA"
            exit 0
          fi

          # Slow-path: poll until READY at expected SHA or deadline
          # Deadline: 10 min (was 15). Root cause of needing >10 min = Vercel build issue, not CI.
          deadline=$((SECONDS + 600))
          matched=0

          while [[ $SECONDS -lt $deadline ]]; do
            sleep 15
            DEPLOY_INFO="$(resolve_deployment)"
            if [[ -z "$DEPLOY_INFO" ]]; then
              echo "Could not resolve deployment ID for alias yet; retrying..."
              continue
            fi
            if check_match "$DEPLOY_INFO"; then
              matched=1
              break
            fi
          done

          if [[ "$matched" -ne 1 ]]; then
            echo "❌ Vercel production alias did not converge to origin/main within 10 minutes."
            echo "Expected SHA: $EXPECTED_SHA"
            echo "Current alias deployment info: ${DEPLOY_INFO:-unresolved}"
            print_recent_production_deployments
            echo "If Vercel build time is the blocker, address Vercel build performance — do not increase this deadline."
            exit 1
          fi

          echo "✅ Vercel production alias matches origin/main SHA: $EXPECTED_SHA"

  verify-supabase-prod-drift:
    name: Verify Supabase Production Migration Parity
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.apply_supabase_migrations != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_DB_URL: ${{ secrets.PROD_SUPABASE_DB_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure psql is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Verify required Supabase production secrets
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${SUPABASE_DB_URL:-}" ]] || { echo "Missing PROD_SUPABASE_DB_URL"; exit 1; }

          if [[ -z "${SUPABASE_DB_PASSWORD:-}" ]]; then
            DERIVED_DB_PASSWORD="$(python3 -c 'import os, urllib.parse; u=os.environ.get("SUPABASE_DB_URL", ""); print(urllib.parse.unquote(urllib.parse.urlparse(u).password or "") if u else "")')"
            if [[ -n "$DERIVED_DB_PASSWORD" ]]; then
              export SUPABASE_DB_PASSWORD="$DERIVED_DB_PASSWORD"
              echo "Derived SUPABASE_DB_PASSWORD from PROD_SUPABASE_DB_URL"
            else
              echo "Missing PROD_SUPABASE_DB_PASSWORD and could not derive from PROD_SUPABASE_DB_URL"
              exit 1
            fi
          fi

      - name: Verify migration parity (repo vs production)
        shell: bash
        run: |
          set -euo pipefail

          LOCAL_IDS="$(ls supabase/migrations/*.sql | xargs -n1 basename | cut -d'_' -f1 | sort -u)"
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -Atqc "SELECT 1" >/dev/null
          REMOTE_ROWS="$(psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -Atqc "SELECT version::text FROM supabase_migrations.schema_migrations ORDER BY version")"

          echo "Remote schema_migrations rows:"
          printf '%s\n' "$REMOTE_ROWS"

          MALFORMED_REMOTE="$(printf '%s\n' "$REMOTE_ROWS" | grep -Ev '^$|^[0-9]{14}$' || true)"
          if [[ -n "$MALFORMED_REMOTE" ]]; then
            echo "❌ Production has malformed schema_migrations.version values (expected exactly 14 digits):"
            printf '%s\n' "$MALFORMED_REMOTE"
            exit 1
          fi

          REMOTE_IDS="$(printf '%s\n' "$REMOTE_ROWS" | grep -E '^[0-9]{14}$' | sort -u || true)"

          echo "Local migration IDs:"
          printf '%s\n' "$LOCAL_IDS"
          echo "Remote migration IDs:"
          printf '%s\n' "$REMOTE_IDS"

          MISSING_REMOTE="$(comm -23 <(printf '%s\n' "$LOCAL_IDS") <(printf '%s\n' "$REMOTE_IDS") || true)"
          EXTRA_REMOTE="$(comm -13 <(printf '%s\n' "$LOCAL_IDS") <(printf '%s\n' "$REMOTE_IDS") || true)"

          if [[ -n "$MISSING_REMOTE" ]]; then
            echo "❌ Production is missing repo migrations:"
            printf '%s\n' "$MISSING_REMOTE"
            exit 1
          fi

          if [[ -n "$EXTRA_REMOTE" ]]; then
            echo "❌ Production has remote-only migrations not present in repo:"
            printf '%s\n' "$EXTRA_REMOTE"
            exit 1
          fi

          echo "✅ Supabase production migrations are fully aligned with repo"

  apply-supabase-prod-migrations:
    name: Apply + Verify Supabase Production Migrations (Manual)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply_supabase_migrations == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
      SUPABASE_DB_URL: ${{ secrets.PROD_SUPABASE_DB_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: ./.github/actions/setup-supabase-cli

      - name: Ensure psql is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Verify required Supabase production secrets
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${SUPABASE_ACCESS_TOKEN:-}" ]] || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          [[ -n "${SUPABASE_PROJECT_REF:-}" ]] || { echo "Missing PROD_SUPABASE_PROJECT_REF"; exit 1; }
          [[ -n "${SUPABASE_DB_URL:-}" ]] || { echo "Missing PROD_SUPABASE_DB_URL"; exit 1; }

          if [[ -z "${SUPABASE_DB_PASSWORD:-}" ]]; then
            DERIVED_DB_PASSWORD="$(python3 -c 'import os, urllib.parse; u=os.environ.get("SUPABASE_DB_URL", ""); print(urllib.parse.unquote(urllib.parse.urlparse(u).password or "") if u else "")')"
            if [[ -n "$DERIVED_DB_PASSWORD" ]]; then
              export SUPABASE_DB_PASSWORD="$DERIVED_DB_PASSWORD"
              echo "Derived SUPABASE_DB_PASSWORD from PROD_SUPABASE_DB_URL"
            else
              echo "Missing PROD_SUPABASE_DB_PASSWORD and could not derive from PROD_SUPABASE_DB_URL"
              exit 1
            fi
          fi

      - name: Link Supabase production project
        shell: bash
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --yes

      - name: Apply repo migrations to production
        shell: bash
        run: |
          set -euo pipefail
          # Manual-only mutation path, gated by workflow_dispatch + production env approval.
          (yes || true) | supabase db push --linked --include-all

      - name: Verify migration parity (repo vs production)
        shell: bash
        run: |
          set -euo pipefail

          LOCAL_IDS="$(ls supabase/migrations/*.sql | xargs -n1 basename | cut -d'_' -f1 | sort -u)"
          REMOTE_ROWS="$(psql "$SUPABASE_DB_URL" -Atqc "SELECT version::text FROM supabase_migrations.schema_migrations ORDER BY version")"

          echo "Remote schema_migrations rows:"
          printf '%s\n' "$REMOTE_ROWS"

          MALFORMED_REMOTE="$(printf '%s\n' "$REMOTE_ROWS" | grep -Ev '^$|^[0-9]{14}$' || true)"
          if [[ -n "$MALFORMED_REMOTE" ]]; then
            echo "❌ Production has malformed schema_migrations.version values (expected exactly 14 digits):"
            printf '%s\n' "$MALFORMED_REMOTE"
            exit 1
          fi

          REMOTE_IDS="$(printf '%s\n' "$REMOTE_ROWS" | grep -E '^[0-9]{14}$' | sort -u || true)"

          echo "Local migration IDs:"
          printf '%s\n' "$LOCAL_IDS"
          echo "Remote migration IDs:"
          printf '%s\n' "$REMOTE_IDS"

          MISSING_REMOTE="$(comm -23 <(printf '%s\n' "$LOCAL_IDS") <(printf '%s\n' "$REMOTE_IDS") || true)"
          EXTRA_REMOTE="$(comm -13 <(printf '%s\n' "$LOCAL_IDS") <(printf '%s\n' "$REMOTE_IDS") || true)"

          if [[ -n "$MISSING_REMOTE" ]]; then
            echo "❌ Production is missing repo migrations:"
            printf '%s\n' "$MISSING_REMOTE"
            exit 1
          fi

          if [[ -n "$EXTRA_REMOTE" ]]; then
            echo "❌ Production has remote-only migrations not present in repo:"
            printf '%s\n' "$EXTRA_REMOTE"
            exit 1
          fi

          echo "✅ Supabase production migrations are fully aligned with repo"
