name: CI (staging tests)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:
  # Staging tests gated to push-to-main only (DB connectivity issues)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  staging-tests:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Audit (allow known advisories if documented)
        shell: bash
        run: |
          set -eu

          # Fast path: no high vulns.
          if npm audit --audit-level=high >/dev/null 2>&1; then
            echo "npm audit (high) clean ✅"
            exit 0
          fi

          # Controlled path: audit is failing; validate only high/critical keys against docs/NPM_AUDIT_NOTES.md.
          (npm audit --json 2>&1 || true) | node scripts/validate-npm-audit-notes.mjs
