name: CI (staging tests)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  staging-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci
      - name: Audit (allow known tar advisory if documented)
        run: |
          set -euo pipefail

          # If npm audit at high passes, we're done.
          if npm audit --audit-level=high >/dev/null 2>&1; then
            echo "npm audit (high) clean ✅"
            exit 0
          fi

          # Otherwise, parse JSON and allow ONLY the known tar advisory (sometimes surfaced under "supabase")
          npm audit --json | node -e '
            const fs = require("fs");
            const j = JSON.parse(fs.readFileSync(0, "utf8"));
            const vulns = j.vulnerabilities || {};
            const keys = Object.keys(vulns);

            const allow = new Set(["tar", "supabase"]);
            const bad = keys.filter(k => !allow.has(k));

            if (bad.length) {
              console.error("Unexpected high vulns:", bad);
              process.exit(1);
            }

            if (!keys.includes("tar") && !keys.includes("supabase")) {
              console.error("High vuln present but not tar/supabase? keys:", keys);
              process.exit(1);
            }

            const notesPath = "docs/NPM_AUDIT_NOTES.md";
            if (!fs.existsSync(notesPath)) {
              console.error("Missing docs/NPM_AUDIT_NOTES.md for approved tar/supabase advisory.");
              process.exit(1);
            }

            console.log("Only known tar advisory remains (tar via supabase); documented ✅");
          '

          # Node exited 0 => allowlisted vulnerability case is acceptable.
          exit 0


      - name: Run staging tests (Supabase secrets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env.test.local
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env.test.local
          DOTENV_CONFIG_PATH=.env.test.local npm run test:staging -- --runInBand --detectOpenHandles
