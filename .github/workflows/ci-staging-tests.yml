name: CI (staging tests)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  staging-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Audit (allow known tar advisory if documented)
        shell: bash
        run: |
          set -euo pipefail

          # Fast path: no high vulns.
          if npm audit --audit-level=high >/dev/null 2>&1; then
            echo "npm audit (high) clean ✅"
            exit 0
          fi

          # Controlled path: audit is failing; capture JSON but neutralize npm's exit code.
          AUDIT_JSON="$(npm audit --json 2>/dev/null || true)"

          node -e '
            const fs = require("fs");

            const data = fs.readFileSync(0, "utf8");
            if (!data || !data.trim()) {
              console.error("npm audit returned no JSON; cannot validate allowlist.");
              process.exit(1);
            }

            let j;
            try {
              j = JSON.parse(data);
            } catch (e) {
              console.error("Failed to parse npm audit JSON:", e.message);
              process.exit(1);
            }

            const vulns = j.vulnerabilities || {};
            const keys = Object.keys(vulns);

            const allow = new Set(["tar", "supabase", "next", "eslint"]);
            const bad = keys.filter(k => !allow.has(k));

            if (bad.length) {
              console.error("Unexpected high vulns:", bad);
              process.exit(1);
            }

            if (!keys.some(k => ["tar", "supabase", "next"].includes(k))) {
              console.error("High vuln present but not tar/supabase/next? keys:", keys);
              process.exit(1);
            }

            const notesPath = "docs/NPM_AUDIT_NOTES.md";
            if (!fs.existsSync(notesPath)) {
              console.error("Missing docs/NPM_AUDIT_NOTES.md for approved tar/supabase/next advisories.");
              process.exit(1);
            }

            console.log("Only known tar/supabase/next advisories remain (documented in NPM_AUDIT_NOTES.md) ✅");
        '
          exit 0

      - name: Run staging tests (Supabase secrets)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env.test.local
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env.test.local
          DOTENV_CONFIG_PATH=.env.test.local npm run test:staging -- --runInBand --detectOpenHandles
