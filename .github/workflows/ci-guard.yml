name: CI Guard

on:
  pull_request:
    branches: [main]

jobs:
  ci-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run CI Guard
        run: npm run ci-guard -- --base origin/${{ github.base_ref }} --head ${{ github.sha }} --artifact artifacts/ci-guard-report.json

      - name: Enforce Tier2 contract import boundary
        run: npm run guard:tier2-contract-import-boundary

      - name: Upload CI Guard Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-guard-report
          path: artifacts/ci-guard-report.json
