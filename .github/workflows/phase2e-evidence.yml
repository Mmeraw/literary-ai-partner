name: Phase 2E Evidence Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/phase2e-evidence.yml"
      - "supabase/migrations/**"
      - "scripts/evidence-phase2e.sh"
      - "PHASE2E_STATUS.md"
      - "package.json"
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/phase2e-evidence.yml"
      - "supabase/migrations/**"
      - "scripts/evidence-phase2e.sh"
      - "PHASE2E_STATUS.md"
      - "package.json"

jobs:
  evidence:
    name: Phase 2E Evidence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Verify secrets are present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Secret presence check:"
          [ -n "$SUPABASE_URL" ] && echo "  ✓ SUPABASE_URL present" || echo "  ✗ SUPABASE_URL MISSING"
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && echo "  ✓ SUPABASE_SERVICE_ROLE_KEY present" || echo "  ✗ SUPABASE_SERVICE_ROLE_KEY MISSING"
          [ -n "$SUPABASE_ANON_KEY" ] && echo "  ✓ SUPABASE_ANON_KEY present" || echo "  ✗ SUPABASE_ANON_KEY MISSING"
          echo ""
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: Critical secrets are missing"
            exit 1
          fi

      # OPTIONAL: You can later commit this script into the repo and delete this step.
      - name: Prepare RLS validation script
        run: |
          mkdir -p scripts
          cat > scripts/verify_phase2e_rls.py << 'EOF'
          #!/usr/bin/env python3
          import json
          import sys

          EXPECTED = ["manuscripts", "manuscript_chunks"]

          def main() -> int:
              try:
                  data = json.load(sys.stdin)
              except Exception as e:
                  print("  ✗ FAILED: Response is not valid JSON:", e)
                  return 1

              by_table = {}
              for row in data:
                  t = row.get("tablename")
                  if not t:
                      continue
                  by_table.setdefault(t, []).append(row)

              overall_failed = False

              for t in EXPECTED:
                  rows = by_table.get(t, [])
                  table_failed = False

                  if not rows:
                      print(f"  ✗ FAILED: No rows returned for table {t}")
                      table_failed = True
                  else:
                      if not any(r.get("rls_enabled") for r in rows):
                          print(f"  ✗ FAILED: RLS not enabled for table {t}")
                          table_failed = True

                      if not any(r.get("policyname") for r in rows):
                          print(f"  ✗ FAILED: No policies found for table {t}")
                          table_failed = True

                  if table_failed:
                      overall_failed = True
                  else:
                      print(f"  ✓ {t} OK")

              return 1 if overall_failed else 0

          if __name__ == "__main__":
              sys.exit(main())
          EOF
          chmod +x scripts/verify_phase2e_rls.py

      - name: Verify Phase 2E RLS Policies
        id: verify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -eo pipefail

          OUTPUT_FILE="/tmp/phase2e-evidence.log"
          exec > >(tee "$OUTPUT_FILE") 2>&1

          echo "=== Phase 2E Evidence Verification ==="
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Commit: ${{ github.sha }}"
          echo ""

          CHECKS_PASSED=0
          CHECKS_FAILED=0

          query_policies_rpc() {
            local rpc_endpoint="$SUPABASE_URL/rest/v1/rpc/verify_phase2e_rls_policies"
            echo "Calling RPC: $rpc_endpoint"

            set +e
            FULL_RESPONSE=$(curl -sS -w "\n__HTTP_STATUS:%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "$rpc_endpoint" 2>&1)
            CURL_EXIT=$?
            set -e

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "  ✗ FAILED: curl exited with $CURL_EXIT"
              ((CHECKS_FAILED++))
              return 1
            fi

            HTTP_CODE=$(echo "$FULL_RESPONSE" | grep "__HTTP_STATUS" | cut -d: -f2)
            BODY=$(echo "$FULL_RESPONSE" | sed '/__HTTP_STATUS/d')

            echo "  HTTP Status: $HTTP_CODE"
            echo ""

            if [ "$HTTP_CODE" != "200" ]; then
              echo "  ✗ FAILED: HTTP $HTTP_CODE"
              echo "  Response body: $BODY"
              ((CHECKS_FAILED++))
              return 1
            fi

            set +e
            echo "$BODY" | python3 scripts/verify_phase2e_rls.py
            PY_EXIT=$?
            set -e

            if [ "$PY_EXIT" -eq 0 ]; then
              ((CHECKS_PASSED++))
              return 0
            fi

            ((CHECKS_FAILED++))
            return 1
          }

          query_policies_rpc || true

          echo ""
          echo "=== Phase 2E Verification Summary ==="
          echo "Checks passed: $CHECKS_PASSED"
          echo "Checks failed: $CHECKS_FAILED"
          echo ""

          mkdir -p artifacts
          cp "$OUTPUT_FILE" artifacts/phase2e-evidence-ci.log 2>/dev/null || true
          echo "LOG_COPIED=true" >> "$GITHUB_OUTPUT"

          if [ "$CHECKS_FAILED" -eq 0 ]; then
            echo "✅ Phase 2E Evidence: LOCKED"
            exit 0
          else
            echo "❌ Phase 2E Evidence: FAILED"
            exit 1
          fi

      - name: Upload Evidence Artifact
        if: always() && steps.verify.outputs.LOG_COPIED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: phase2e-evidence-${{ github.sha }}
          path: artifacts/phase2e-evidence-ci.log
          retention-days: 90

      - name: Evidence Summary
        if: success()
        run: |
          echo "## ✅ Phase 2E Evidence: LOCKED" >> "$GITHUB_STEP_SUMMARY"

      - name: Failure Summary
        if: failure()
        run: |
          echo "## ❌ Phase 2E Evidence: FAILED" >> "$GITHUB_STEP_SUMMARY"
