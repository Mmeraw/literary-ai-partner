name: Phase 2E Evidence Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/phase2e-evidence.yml'
      - 'supabase/migrations/**'
      - 'scripts/evidence-phase2e.sh'
      - 'PHASE2E_STATUS.md'
      - 'package.json'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/phase2e-evidence.yml'
      - 'supabase/migrations/**'
      - 'scripts/evidence-phase2e.sh'
      - 'PHASE2E_STATUS.md'
      - 'package.json'

jobs:
  evidence:
    name: Phase 2E Evidence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify secrets are present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Secret presence check:"
          [ -n "$SUPABASE_URL" ] && echo "  ✓ SUPABASE_URL present" || echo "  ✗ SUPABASE_URL MISSING"
          [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && echo "  ✓ NEXT_PUBLIC_SUPABASE_URL present" || echo "  ✗ NEXT_PUBLIC_SUPABASE_URL MISSING"
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && echo "  ✓ SUPABASE_SERVICE_ROLE_KEY present" || echo "  ✗ SUPABASE_SERVICE_ROLE_KEY MISSING"
          echo ""
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "ERROR: Critical secrets are missing"
            exit 1
          fi

      - name: Verify Phase 2E RLS Policies
        id: verify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -eo pipefail
          
          # Create verification output
          OUTPUT_FILE="/tmp/phase2e-evidence.log"
          {
            echo "=== Phase 2E Evidence Verification ==="
            echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit: ${{ github.sha }}"
            echo ""
            
            # Extract project ID from URL
            PROJECT_ID=$(echo "$SUPABASE_URL" | grep -oP '(?<=https://)[^.]+' || echo "unknown")
            echo "Project ID: $PROJECT_ID"
            echo ""
            
            # Verify RLS policies via Supabase API
            echo "Verifying RLS Policies..."
            echo ""
            
            CHECKS_PASSED=0
            CHECKS_FAILED=0
            
            # Check manuscripts table policies
            echo "Checking manuscripts table RLS policies..."
            POLICY_RESPONSE=$(curl -s \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              "$SUPABASE_URL/rest/v1/pg_policies?table_name=eq.manuscripts" 2>&1)
            
            if echo "$POLICY_RESPONSE" | grep -q 'policyname'; then
              echo "  ✓ manuscripts RLS policies found"
              ((CHECKS_PASSED++))
            else
              echo "  ✗ FAILED: No manuscripts RLS policies found"
              echo "  Response: $POLICY_RESPONSE"
              ((CHECKS_FAILED++))
            fi
            
            echo ""
            echo "Checking manuscript_chunks table RLS policies..."
            POLICY_RESPONSE=$(curl -s \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              "$SUPABASE_URL/rest/v1/pg_policies?table_name=eq.manuscript_chunks" 2>&1)
            
            if echo "$POLICY_RESPONSE" | grep -q 'policyname'; then
              echo "  ✓ manuscript_chunks RLS policies found"
              ((CHECKS_PASSED++))
            else
              echo "  ✗ FAILED: No manuscript_chunks RLS policies found"
              ((CHECKS_FAILED++))
            fi
            
            echo ""
            echo "=== Phase 2E Verification Summary ==="
            echo "Checks passed: $CHECKS_PASSED"
            echo "Checks failed: $CHECKS_FAILED"
            echo ""
            
            if [ "$CHECKS_FAILED" -eq 0 ]; then
              echo "✅ Phase 2E Evidence: LOCKED"
              echo "All RLS policies verified successfully"
            else
              echo "❌ Phase 2E Evidence: FAILED"
              echo "One or more policy checks failed"
              exit 1
            fi
          } > "$OUTPUT_FILE"
          
          cat "$OUTPUT_FILE"
          
          # Copy to artifacts
          mkdir -p artifacts
          cp "$OUTPUT_FILE" artifacts/phase2e-evidence-ci.log
          echo "LOG_COPIED=true" >> $GITHUB_OUTPUT

      - name: Upload Evidence Artifact
        if: always() && steps.verify.outputs.LOG_COPIED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: phase2e-evidence-${{ github.sha }}
          path: artifacts/phase2e-evidence-ci.log
          retention-days: 90

      - name: Evidence Summary
        if: success()
        run: |
          echo "## ✅ Phase 2E Evidence: LOCKED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** RLS policies verified" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Reference:** [\`7c37c60\` - docs(phase2e): record canonical user_id RLS migrations + proof](https://github.com/Mmeraw/literary-ai-partner/commit/7c37c60)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Canonical user_id RLS | ✅ Locked |" >> $GITHUB_STEP_SUMMARY
          echo "| RLS Policy Verification | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Evidence Gate | ✅ Locked |" >> $GITHUB_STEP_SUMMARY

      - name: Failure Summary
        if: failure()
        run: |
          echo "## ❌ Phase 2E Evidence: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Evidence verification failed" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details on which verification step failed." >> $GITHUB_STEP_SUMMARY
