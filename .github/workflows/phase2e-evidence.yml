name: Phase 2E Evidence Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/phase2e-evidence.yml'
      - 'supabase/migrations/**'
      - 'scripts/evidence-phase2e.sh'
      - 'PHASE2E_STATUS.md'
      - 'package.json'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/phase2e-evidence.yml'
      - 'supabase/migrations/**'
      - 'scripts/evidence-phase2e.sh'
      - 'PHASE2E_STATUS.md'
      - 'package.json'

jobs:
  evidence:
    name: Phase 2E Evidence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify secrets are present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Secret presence check:"
          [ -n "$SUPABASE_URL" ] && echo "  ✓ SUPABASE_URL present" || echo "  ✗ SUPABASE_URL MISSING"
          [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && echo "  ✓ NEXT_PUBLIC_SUPABASE_URL present" || echo "  ✗ NEXT_PUBLIC_SUPABASE_URL MISSING"
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && echo "  ✓ SUPABASE_SERVICE_ROLE_KEY present" || echo "  ✗ SUPABASE_SERVICE_ROLE_KEY MISSING"
          echo ""
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "ERROR: Critical secrets are missing"
            exit 1
          fi

      - name: Verify Phase 2E RLS Policies
        id: verify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -eo pipefail
          
          # Create verification output (tee to both file AND stdout)
          OUTPUT_FILE="/tmp/phase2e-evidence.log"
          
          # Use process substitution to write to file AND display - works even if script fails
          exec > >(tee "$OUTPUT_FILE") 2>&1
          
          echo "=== Phase 2E Evidence Verification ==="
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Commit: ${{ github.sha }}"
          echo ""
          
          # Extract project ID from URL
          PROJECT_ID=$(echo "$SUPABASE_URL" | grep -oP '(?<=https://)[^.]+' || echo "unknown")
          echo "Project ID: $PROJECT_ID"
          echo ""
          
          # Verify RLS policies via Supabase API
          echo "=== Verifying RLS Policies ==="
          echo ""
          
          CHECKS_PASSED=0
          CHECKS_FAILED=0
          
          # Helper: Query pg_policies with diagnostics
          query_policies() {
            local table_to_check="$1"
            local check_name="$2"
            
            echo "Checking $check_name table RLS policies..."
            
            # Capture response with HTTP status
            local FULL_RESPONSE=$(curl -sS -w "\n__HTTP_STATUS:%{http_code}" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Content-Type: application/json" \
              "$SUPABASE_URL/rest/v1/pg_policies?tablename=eq.$table_to_check" 2>&1)
            
            local HTTP_CODE=$(echo "$FULL_RESPONSE" | grep "__HTTP_STATUS" | cut -d: -f2)
            local BODY=$(echo "$FULL_RESPONSE" | sed '/__HTTP_STATUS/d')
            
            echo "  HTTP Status: $HTTP_CODE"
            echo "  Response preview: $(echo "$BODY" | head -c 150)..."
            echo ""
            
            # Check status code first
            if [ "$HTTP_CODE" != "200" ]; then
              echo "  ✗ FAILED: HTTP $HTTP_CODE (invalid query or access denied)"
              echo "  Response body: $BODY"
              ((CHECKS_FAILED++))
              return 1
            fi
            
            # Check if response is valid JSON - empty array
            if echo "$BODY" | grep -qE '^\[\s*\]'; then
              echo "  ✗ FAILED: No RLS policies found for $check_name table"
              ((CHECKS_FAILED++))
              return 1
            fi
            
            # Check for policyname field (indicates policies exist)
            if echo "$BODY" | grep -q '"policyname"'; then
              echo "  ✓ $check_name table has RLS policies defined"
              ((CHECKS_PASSED++))
              return 0
            else
              echo "  ✗ FAILED: No policyname field in response for $check_name"
              echo "  Likely: Endpoint not configured or policies truly missing"
              ((CHECKS_FAILED++))
              return 1
            fi
          }
          
          # Query both tables
          query_policies "manuscripts" "manuscripts"
          query_policies "manuscript_chunks" "manuscript_chunks"
          
          echo ""
          echo "=== Phase 2E Verification Summary ==="
          echo "Checks passed: $CHECKS_PASSED"
          echo "Checks failed: $CHECKS_FAILED"
          echo ""
          
          if [ "$CHECKS_FAILED" -eq 0 ]; then
            echo "✅ Phase 2E Evidence: LOCKED"
            echo "All RLS policies verified successfully"
            # Copy to artifacts before exiting
            mkdir -p artifacts
            cp "$OUTPUT_FILE" artifacts/phase2e-evidence-ci.log
            echo "LOG_COPIED=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Phase 2E Evidence: FAILED"
            echo "One or more policy checks failed"
            # Copy to artifacts before exiting (so we can see what failed)
            mkdir -p artifacts
            cp "$OUTPUT_FILE" artifacts/phase2e-evidence-ci.log 2>/dev/null || true
            echo "LOG_COPIED=true" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload Evidence Artifact
        if: always() && steps.verify.outputs.LOG_COPIED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: phase2e-evidence-${{ github.sha }}
          path: artifacts/phase2e-evidence-ci.log
          retention-days: 90

      - name: Evidence Summary
        if: success()
        run: |
          echo "## ✅ Phase 2E Evidence: LOCKED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** RLS policies verified" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Reference:** [\`7c37c60\` - docs(phase2e): record canonical user_id RLS migrations + proof](https://github.com/Mmeraw/literary-ai-partner/commit/7c37c60)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Canonical user_id RLS | ✅ Locked |" >> $GITHUB_STEP_SUMMARY
          echo "| RLS Policy Verification | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Evidence Gate | ✅ Locked |" >> $GITHUB_STEP_SUMMARY

      - name: Failure Summary
        if: failure()
        run: |
          echo "## ❌ Phase 2E Evidence: FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Evidence verification failed" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details on which verification step failed." >> $GITHUB_STEP_SUMMARY
