name: Phase 2E Evidence Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/phase2e-evidence.yml"
      - "supabase/migrations/**"
      - "PHASE2E_STATUS.md"

permissions:
  contents: read

jobs:
  evidence:
    name: Phase 2E Evidence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify required secrets are present (no values printed)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          echo "Secret presence check:"
          [ -n "$SUPABASE_URL" ] && echo "  ✓ SUPABASE_URL present" || (echo "  ✗ SUPABASE_URL MISSING" && exit 1)
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && echo "  ✓ SUPABASE_SERVICE_ROLE_KEY present" || (echo "  ✗ SUPABASE_SERVICE_ROLE_KEY MISSING" && exit 1)

      - name: Prepare RLS validation script
        run: |
          mkdir -p scripts
          cat > scripts/verify_phase2e_rls.py << 'EOF'
          #!/usr/bin/env python3
          import json
          import sys

          EXPECTED = ["manuscripts", "manuscript_chunks"]

          def main() -> int:
              try:
                  data = json.load(sys.stdin)
              except Exception as e:
                  print("  ✗ FAILED: Response is not valid JSON:", e)
                  return 1

              if not isinstance(data, list):
                  print("  ✗ FAILED: Expected a JSON array of rows.")
                  return 1

              by_table = {}
              for row in data:
                  t = row.get("tablename")
                  if not t:
                      continue
                  by_table.setdefault(t, []).append(row)

              overall_failed = False

              for t in EXPECTED:
                  rows = by_table.get(t, [])
                  table_failed = False

                  if not rows:
                      print(f"  ✗ FAILED: No rows returned for table {t}")
                      table_failed = True
                  else:
                      if not any(bool(r.get("rls_enabled")) for r in rows):
                          print(f"  ✗ FAILED: RLS not enabled for table {t}")
                          table_failed = True

                      if not any(r.get("policyname") for r in rows):
                          print(f"  ✗ FAILED: No policies found for table {t}")
                          table_failed = True

                  if table_failed:
                      overall_failed = True
                  else:
                      print(f"  ✓ {t} OK")

              return 1 if overall_failed else 0

          if __name__ == "__main__":
              raise SystemExit(main())
          EOF
          chmod +x scripts/verify_phase2e_rls.py

      - name: Verify Phase 2E RLS Policies via RPC
        id: verify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -eo pipefail

          OUTPUT_FILE="/tmp/phase2e-evidence.log"
          exec > >(tee "$OUTPUT_FILE") 2>&1

          echo "=== Phase 2E Evidence Verification ==="
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Commit: ${{ github.sha }}"
          echo ""

          RPC_ENDPOINT="$SUPABASE_URL/rest/v1/rpc/verify_phase2e_rls_policies"
          echo "Calling RPC: $RPC_ENDPOINT"

          FULL_RESPONSE=$(curl -sS -w "\n__HTTP_STATUS:%{http_code}" \
            -X POST \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$RPC_ENDPOINT")

          HTTP_CODE=$(echo "$FULL_RESPONSE" | grep "__HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$FULL_RESPONSE" | sed '/__HTTP_STATUS/d')

          echo "  HTTP Status: $HTTP_CODE"
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            echo "  ✗ FAILED: HTTP $HTTP_CODE"
            echo "  Response body (truncated):"
            echo "$BODY" | head -50
            exit 1
          fi

          echo "$BODY" | python3 scripts/verify_phase2e_rls.py

          mkdir -p artifacts
          cp "$OUTPUT_FILE" artifacts/phase2e-evidence-ci.log
          echo "LOG_COPIED=true" >> "$GITHUB_OUTPUT"

          echo ""
          echo "✅ Phase 2E Evidence: LOCKED"

      - name: Upload Evidence Artifact
        if: always() && steps.verify.outputs.LOG_COPIED == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: phase2e-evidence-${{ github.sha }}
          path: artifacts/phase2e-evidence-ci.log
          retention-days: 90

      - name: Evidence Summary
        if: success()
        run: |
          echo "## ✅ Phase 2E Evidence: LOCKED" >> "$GITHUB_STEP_SUMMARY"

      - name: Failure Summary
        if: failure()
        run: |
          echo "## ❌ Phase 2E Evidence: FAILED" >> "$GITHUB_STEP_SUMMARY"
