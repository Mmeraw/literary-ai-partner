name: PR 1233 One-Shot Autofix

on:
  pull_request:
    branches:
      - pr1233-autofix-base
  push:
    branches:
      - fix/revise-full-canonical-opportunity-supply

permissions:
  contents: write

jobs:
  apply-fixes:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[pr1233-autofix-done]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: Mmeraw/literary-ai-partner
          ref: fix/revise-full-canonical-opportunity-supply
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply code mod
        run: python3 scripts/pr1233-autofix.py

      - name: Run targeted proof
        run: |
          npm ci
          npm test -- --runInBand --no-coverage __tests__/lib/revision/opportunityLedger.test.ts __tests__/lib/revision/reviseCanonicalAuthority.test.ts __tests__/lib/revision/reviseCanonicalAuthorityEdges.test.ts
          bash scripts/verify-phase-a5-day2.sh

      - name: Commit fixes and remove one-shot scaffolding
        run: |
          rm .github/workflows/pr1233-autofix.yml
          rm scripts/pr1233-autofix.py
          rm -f .github/pr1233-autofix-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close Revise authority edge cases [pr1233-autofix-done]"
          git push origin HEAD:fix/revise-full-canonical-opportunity-supply
